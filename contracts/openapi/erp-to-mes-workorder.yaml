openapi: 3.0.3
info:
  title: ERP → MES 작업지시 수신 API
  version: "1.0.0"
  description: >
    ERP(hwlee-erp)가 생산지시(PO)를 MES(hwlee-mes)로 동기 전송하는 계약.
    erpOrderNo 를 멱등 키로 사용한다 — 같은 PO 를 여러 번 보내도 MES 는 한 번만 등록한다.
    응답 코드: 201=신규 수신, 200=이미 등록(멱등).

servers:
  - url: http://localhost:8082
    description: MES (로컬)

paths:
  /api/work-orders:
    post:
      summary: 작업지시 수신
      operationId: receiveWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderReceiveRequest"
      responses:
        "201":
          description: 신규 작업지시 등록됨
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderResponse"
        "200":
          description: 이미 등록된 작업지시(멱등 — 중복 무시)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderResponse"
        "400":
          description: 검증 실패

components:
  schemas:
    WorkOrderReceiveRequest:
      type: object
      required: [erpOrderNo, productCode, productName, quantity]
      properties:
        erpOrderNo:
          type: string
          example: "PO-20260604-001"
          description: ERP 생산지시 번호 (멱등 키)
        productCode:
          type: string
          example: "ITEM-2026-0001"
        productName:
          type: string
          example: "hyunwoo 노트북 15\""
        quantity:
          type: number
          example: 10
        plannedDate:
          type: string
          format: date
          example: "2026-06-09"
        components:
          type: array
          items:
            $ref: "#/components/schemas/ComponentLine"
    ComponentLine:
      type: object
      required: [componentCode, componentName, requiredQty]
      properties:
        componentCode:
          type: string
          example: "ITEM-2026-0003"
        componentName:
          type: string
          example: "15\" LCD 패널"
        requiredQty:
          type: number
          example: 10
        unit:
          type: string
          example: "EA"
    WorkOrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        workOrderNo:
          type: string
          example: "WO-20260604-001"
        erpOrderNo:
          type: string
          example: "PO-20260604-001"
        productCode:
          type: string
        productName:
          type: string
        quantity:
          type: number
        plannedDate:
          type: string
          format: date
        status:
          type: string
          enum: [RECEIVED, IN_PROGRESS, COMPLETED, CANCELLED]
        receivedAt:
          type: string
          format: date-time
        lines:
          type: array
          items:
            type: object
            properties:
              lineNo: { type: integer }
              componentCode: { type: string }
              componentName: { type: string }
              requiredQty: { type: number }
              unit: { type: string }
