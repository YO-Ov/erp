# ═══════════════════════════════════════════════════════════════════
# 서버(Oracle Cloud) 배포용 통합 compose
#   인프라 4개(MySQL×2·Kafka·Zipkin) + 앱 2개(ERP·MES) 를 한 번에 기동.
#
#   로컬 docker-compose.yml 과의 차이:
#   - 앱 2개(erp/mes)를 Dockerfile 로 빌드해 함께 띄운다.
#   - DB/Kafka/Zipkin 은 '외부에 포트를 열지 않는다'(컨테이너끼리만 통신).
#   - 앱 포트(8080/8082)는 127.0.0.1 로만 바인딩 → 서버 내부에서 curl 확인용.
#     외부 공개는 나중에 리버스 프록시(Caddy/Cloudflare)로 80/443 만.
#
#   기동:  docker compose -f docker-compose.prod.yml up -d --build
#   민감값: 같은 폴더의 .env (JWT_SECRET / *_DB_PASSWORD). .env.example 참고.
# ═══════════════════════════════════════════════════════════════════
services:
  # ── ERP 전용 DB ──────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: hwlee-erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp_db
      MYSQL_USER: erp
      MYSQL_PASSWORD: ${ERP_DB_PASSWORD:-erp}
      TZ: Asia/Seoul
    volumes:
      - hwlee-erp-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uerp", "-p${ERP_DB_PASSWORD:-erp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MES 전용 DB ──────────────────────────────────────────────
  mes-mysql:
    image: mysql:8.4
    container_name: hwlee-mes-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mes_db
      MYSQL_USER: mes
      MYSQL_PASSWORD: ${MES_DB_PASSWORD:-mes}
      TZ: Asia/Seoul
    volumes:
      - hwlee-mes-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umes", "-p${MES_DB_PASSWORD:-mes}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka 단일 브로커 (KRaft) ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: hwlee-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      # 앱은 컨테이너 내부 리스너(kafka:29092)로 붙는다. 호스트 리스너는 디버깅용.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── 분산 추적 ────────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3
    container_name: hwlee-zipkin
    restart: unless-stopped
    ports:
      - "127.0.0.1:9411:9411"   # 서버 내부에서만 UI 확인 (외부 비공개)
    environment:
      TZ: Asia/Seoul

  # ── ERP 앱 ───────────────────────────────────────────────────
  erp:
    build:
      context: ./hwlee-erp
      dockerfile: Dockerfile
    image: hwlee-erp:latest
    container_name: hwlee-erp
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      ERP_DB_PASSWORD: ${ERP_DB_PASSWORD:-erp}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-dot-env-please}
      TZ: Asia/Seoul
      # AI 어시스턴트 — 이 맥에서 도는 에이전트를 Cloudflare Tunnel(agent.hyunwoo.pro)로 호출.
      #   비밀키는 서버 .env 의 ASSISTANT_AGENT_SECRET(에이전트 쪽 AGENT_SECRET 과 동일 값).
      #   비우면 챗봇은 "에이전트 연결 불가" 로만 뜬다(운영 기본 안전값).
      ERP_AGENT_BASE_URL: ${ERP_AGENT_BASE_URL:-https://agent.hyunwoo.pro}
      ASSISTANT_AGENT_SECRET: ${ASSISTANT_AGENT_SECRET:-}
    ports:
      - "127.0.0.1:8080:8080"   # 서버 내부 curl 확인용. 외부는 리버스 프록시로.

  # ── 포트폴리오 (hyunwoo.pro 정적 사이트) ──────────────────────
  #   순수 HTML/CSS/JS 단일 페이지. 외부 포트 없음 → 메인 Caddy 가
  #   hyunwoo.pro 를 이 컨테이너로 프록시(이전엔 erp 서브도메인으로 301 리다이렉트).
  portfolio:
    build:
      context: ./hwlee-portfolio
      dockerfile: Dockerfile
    image: hwlee-portfolio:latest
    container_name: hwlee-portfolio
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul

  # ── ERP 프론트엔드 (React SPA 정적 서버) ──────────────────────
  #   React(Vite) 빌드 산출물(dist)만 서빙하는 초경량 정적 컨테이너.
  #   외부 포트를 열지 않는다 → 메인 Caddy 가 erp.hyunwoo.pro 의
  #   '/api/*'·'/actuator/*' 는 erp:8080 으로, 그 외는 이 컨테이너로 프록시한다.
  #   ⚠️ 이 전환으로 기존 Thymeleaf 화면(챗봇·리포트·관리자 등)은 대체된다(루트=React SPA).
  erp-frontend:
    build:
      context: ./hwlee-erp/frontend
      dockerfile: Dockerfile
    image: hwlee-erp-frontend:latest
    container_name: hwlee-erp-frontend
    restart: unless-stopped
    depends_on:
      - erp
    environment:
      TZ: Asia/Seoul

  # ── MES 앱 ───────────────────────────────────────────────────
  mes:
    build:
      context: ./hwlee-mes
      dockerfile: Dockerfile
    image: hwlee-mes:latest
    container_name: hwlee-mes
    restart: unless-stopped
    depends_on:
      mes-mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MES_DB_PASSWORD: ${MES_DB_PASSWORD:-mes}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:8082:8082"

  # ── MES 프론트엔드 (Vue3 SPA 정적 서버) ───────────────────────
  #   Vue 빌드 산출물(dist)만 서빙하는 초경량 정적 컨테이너(~20MB).
  #   외부 포트를 열지 않는다 → 메인 Caddy 가 mes.hyunwoo.pro 의
  #   '/api/*' 는 mes:8082 로, 그 외는 이 컨테이너로 프록시한다.
  mes-frontend:
    build:
      context: ./hwlee-mes/frontend
      dockerfile: Dockerfile
    image: hwlee-mes-frontend:latest
    container_name: hwlee-mes-frontend
    restart: unless-stopped
    depends_on:
      - mes
    environment:
      TZ: Asia/Seoul

  # ── 리버스 프록시 (외부 공개 관문) ──────────────────────────────
  #   유일하게 외부(0.0.0.0)로 80/443 을 여는 컨테이너.
  #   Cloudflare(주황 구름) → 이 Caddy(443, Origin 인증서) → erp:8080.
  #   Origin 인증서 파일은 서버의 ./caddy/certs/ 에 직접 둔다(origin.pem/origin.key, git 제외).
  caddy:
    image: caddy:2
    container_name: hwlee-caddy
    restart: unless-stopped
    depends_on:
      - erp
      - erp-frontend
      - mes
      - mes-frontend
      - portfolio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      TZ: Asia/Seoul

volumes:
  hwlee-erp-mysql-data:
  hwlee-mes-mysql-data:
  caddy-data:
  caddy-config:
