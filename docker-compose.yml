services:
  # ── ERP 전용 DB ──────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: hwlee-erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp_db
      MYSQL_USER: erp
      MYSQL_PASSWORD: erp
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - hwlee-erp-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uerp", "-perp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MES 전용 DB (시스템 간 DB 분리를 물리적으로 강제) ──────────
  mes-mysql:
    image: mysql:8.4
    container_name: hwlee-mes-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mes_db
      MYSQL_USER: mes
      MYSQL_PASSWORD: mes
      TZ: Asia/Seoul
    ports:
      - "3308:3306"
    volumes:
      - hwlee-mes-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umes", "-pmes"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka 단일 브로커 (MES→ERP 비동기 메시지 버스) ──────────────
  # KRaft 모드: Zookeeper 없이 브로커가 컨트롤러 역할까지 겸한다(broker,controller).
  # 단일 노드라 quorum voter 도 자기 자신 하나(1@kafka:29093). cp-kafka 7.6.1 은
  # CLUSTER_ID 가 있으면 기동 시 스토리지를 자동 포맷(kafka-storage format)한다.
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: hwlee-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"   # 호스트(앱)에서 접속
    environment:
      # ── KRaft 핵심 ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk   # 22자 base64 UUID (고정값 — 재기동 시 동일 클러스터 유지)
      # ── 리스너: 내부(PLAINTEXT)·호스트(PLAINTEXT_HOST)·컨트롤러(CONTROLLER) 3종 ──
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # ── 단일 노드 복제계수 ──
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── 분산 추적 수집/시각화 (두 시스템에 걸친 요청 추적) ──────────
  zipkin:
    image: openzipkin/zipkin:3
    container_name: hwlee-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      TZ: Asia/Seoul

volumes:
  hwlee-erp-mysql-data:
  hwlee-mes-mysql-data:
