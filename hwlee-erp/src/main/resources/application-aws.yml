spring:
  # 비밀번호 등 민감값은 git 에서 제외된 secret.properties 로 주입.
  # (운영에선 이 파일 없이 환경변수 ERP_DB_PASSWORD / JWT_SECRET 가 우선 적용됨)
  # optional: → 파일이 없어도 기동 실패하지 않고 환경변수로 fallback.
  config:
    import: optional:file:./secret.properties
  thymeleaf:
    cache: false          # 학습용: 템플릿 캐시 끔 (local 과 동일)
  web:
    resources:
      cache:
        period: 0
  datasource:
    # 회사 RDS(MySQL 8.4) - 학습 전용 스키마 erp_db / 전용 유저 erp_app
    # 호스트·비밀번호는 환경변수/secret.properties 로만 주입 (yml 에 평문·엔드포인트 금지)
    url: jdbc:mysql://${ERP_DB_HOST}:3306/erp_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${ERP_DB_USER:erp_app}
    password: ${ERP_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
