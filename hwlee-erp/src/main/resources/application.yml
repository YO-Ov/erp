spring:
  application:
    name: hwlee-erp
  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

server:
  port: 8080

# Phase 6 — JWT 설정 (운영에선 환경변수 JWT_SECRET 로 주입)
erp:
  jwt:
    secret: ${JWT_SECRET:hwlee-erp-local-dev-secret-key-please-change-in-prod-0123456789abcdef}
    access-token-validity-seconds: 3600

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /api-docs

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
