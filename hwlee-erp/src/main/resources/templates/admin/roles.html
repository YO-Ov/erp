<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('역할 관리', 'admin-roles', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="page-head">
        <div>
            <h1>역할</h1>
            <div class="crumb">관리자 · 역할 ↔ 권한</div>
        </div>
    </div>

    <div class="table-wrap">
        <table class="table align-middle mb-0">
            <thead>
            <tr><th style="width:200px;">역할</th><th>권한</th></tr>
            </thead>
            <tbody>
            <tr th:each="role : ${roles}">
                <td>
                    <strong th:text="${role.code}">CODE</strong><br>
                    <small class="text-muted" th:text="${role.name}">name</small>
                </td>
                <td>
                    <span class="badge bg-light text-dark border me-1 mb-1"
                          th:each="p : ${role.permissions}" th:text="${p.code}">PERM</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
