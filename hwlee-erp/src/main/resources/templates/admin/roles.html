<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>역할 보기</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">현우-ERP</a>
    <span class="navbar-text text-light">역할-권한 (ADMIN)</span>
</nav>
<div class="container mt-4">
    <h4 class="mb-3">역할 ↔ 권한</h4>
    <table class="table table-bordered">
        <thead class="table-light">
        <tr><th style="width:160px;">역할</th><th>권한</th></tr>
        </thead>
        <tbody>
        <tr th:each="role : ${roles}">
            <td>
                <strong th:text="${role.code}">CODE</strong><br>
                <small class="text-muted" th:text="${role.name}">name</small>
            </td>
            <td>
                <span class="badge bg-info text-dark me-1"
                      th:each="p : ${role.permissions}" th:text="${p.code}">PERM</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
