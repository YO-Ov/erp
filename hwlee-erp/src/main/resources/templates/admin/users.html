<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사용자 관리</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">현우-ERP</a>
    <span class="navbar-text text-light">사용자 관리 (ADMIN)</span>
</nav>
<div class="container mt-4">
    <h4 class="mb-3">사용자 ↔ 역할</h4>
    <p class="text-muted">부서 기반으로 시드된 역할을 여기서 수동 조정합니다. 체크 후 [저장].</p>
    <table class="table table-bordered align-middle">
        <thead class="table-light">
        <tr>
            <th>사용자(username)</th>
            <th>직원</th>
            <th>활성</th>
            <th>역할</th>
            <th style="width:90px;"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.username}">user</td>
            <td th:text="${u.employee != null} ? ${u.employee.name} : '-'">직원</td>
            <td>
                <span th:if="${u.enabled}" class="badge bg-success">활성</span>
                <span th:unless="${u.enabled}" class="badge bg-secondary">비활성</span>
            </td>
            <td>
                <form th:action="@{'/admin/users/' + ${u.id} + '/roles'}" method="post"
                      class="d-flex flex-wrap gap-3 align-items-center">
                    <div class="form-check" th:each="r : ${allRoles}">
                        <input class="form-check-input" type="checkbox" name="roleIds"
                               th:value="${r.id}" th:id="${'r-' + u.id + '-' + r.id}"
                               th:checked="${u.roles.contains(r)}">
                        <label class="form-check-label" th:for="${'r-' + u.id + '-' + r.id}"
                               th:text="${r.code}">ROLE</label>
                    </div>
                    <button type="submit" class="btn btn-sm btn-primary">저장</button>
                </form>
            </td>
            <td></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
