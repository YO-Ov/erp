<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('사용자 관리', 'admin-users', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="page-head">
        <div>
            <h1>사용자</h1>
            <div class="crumb">관리자 · 사용자 ↔ 역할</div>
        </div>
    </div>

    <p class="text-muted">부서 기반으로 시드된 역할을 여기서 수동 조정합니다. 체크 후 [저장].</p>

    <div class="table-wrap">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>사용자(username)</th>
                <th>직원</th>
                <th>활성</th>
                <th>역할</th>
                <th style="width:90px;"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}">user</td>
                <td th:text="${u.employee != null} ? ${u.employee.name} : '-'">직원</td>
                <td>
                    <span th:if="${u.enabled}" class="badge badge-soft badge-soft-success">활성</span>
                    <span th:unless="${u.enabled}" class="badge badge-soft badge-soft-secondary">비활성</span>
                </td>
                <td>
                    <form th:action="@{'/admin/users/' + ${u.id} + '/roles'}" method="post"
                          class="d-flex flex-wrap gap-3 align-items-center">
                        <div class="form-check" th:each="r : ${allRoles}">
                            <input class="form-check-input" type="checkbox" name="roleIds"
                                   th:value="${r.id}" th:id="${'r-' + u.id + '-' + r.id}"
                                   th:checked="${u.roles.contains(r)}">
                            <label class="form-check-label" th:for="${'r-' + u.id + '-' + r.id}"
                                   th:text="${r.code}">ROLE</label>
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary">저장</button>
                    </form>
                </td>
                <td></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
