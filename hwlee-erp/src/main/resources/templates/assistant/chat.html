<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('AI 어시스턴트', 'assistant', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="page-head">
        <div>
            <h1>AI 어시스턴트</h1>
            <div class="crumb">자연어로 업무를 지시하면 로컬 LLM 에이전트가 실행합니다 · 쓰기 작업은 실행 전 확인</div>
        </div>
    </div>

    <style>
        /* 채팅 UI — 이 화면 전용 (다른 목록/폼 화면과 레이아웃이 달라 국소 스타일) */
        .chat-shell { display:flex; flex-direction:column; height:calc(100vh - 190px); min-height:420px;
            border:1px solid var(--bs-border-color,#e5e7eb); border-radius:12px; overflow:hidden; background:#fff; }
        .chat-log { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:14px; background:#f7f8fa; }
        .chat-empty { margin:auto; text-align:center; color:#8a94a6; max-width:460px; }
        .chat-empty .bi { font-size:2.4rem; color:#c3cad6; }
        .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:14px; }
        .chip { border:1px solid #d5dbe6; background:#fff; border-radius:16px; padding:6px 12px; font-size:.82rem;
            color:#475069; cursor:pointer; transition:all .12s; }
        .chip:hover { border-color:#4b6ef5; color:#4b6ef5; }
        .msg { display:flex; max-width:82%; }
        .msg.user { align-self:flex-end; }
        .msg.bot  { align-self:flex-start; }
        .bubble { padding:10px 14px; border-radius:14px; font-size:.9rem; line-height:1.5; white-space:pre-wrap;
            word-break:break-word; box-shadow:0 1px 2px rgba(0,0,0,.05); }
        .msg.user .bubble { background:#4b6ef5; color:#fff; border-bottom-right-radius:4px; }
        .msg.bot  .bubble { background:#fff; color:#1f2733; border:1px solid #e5e8ee; border-bottom-left-radius:4px; }
        .bubble.plan   { border-left:3px solid #f59e0b; background:#fffdf6; }
        .bubble.result { border-left:3px solid #16a34a; background:#f4fbf6; }
        .bubble.error  { border-left:3px solid #dc2626; background:#fef5f5; color:#8a1c1c; }
        .bubble .plan-title { font-weight:600; color:#a15c00; margin-bottom:6px; }
        .plan-actions { display:flex; gap:8px; margin-top:10px; }
        .typing .bubble { color:#8a94a6; font-style:italic; }
        .chat-input { display:flex; gap:8px; padding:12px; border-top:1px solid #e5e8ee; background:#fff; }
        .chat-input textarea { flex:1; resize:none; border:1px solid #d5dbe6; border-radius:10px; padding:10px 12px;
            font-size:.9rem; line-height:1.4; max-height:120px; }
        .chat-input textarea:focus { outline:none; border-color:#4b6ef5; box-shadow:0 0 0 3px rgba(75,110,245,.12); }
        .agent-badge { font-size:.75rem; color:#8a94a6; }
    </style>

    <div class="chat-shell">
        <div class="chat-log" id="log">
            <div class="chat-empty" id="empty">
                <i class="bi bi-robot"></i>
                <div class="mt-2">무엇을 도와드릴까요? 아래 예시를 눌러 시작해 보세요.</div>
                <div class="chips">
                    <span class="chip">신원전자에 노트북 100대 수주해줘</span>
                    <span class="chip">모니터 재고 얼마나 남았어?</span>
                    <span class="chip">내가 상신한 결재 어떻게 됐어?</span>
                    <span class="chip">신원전자 수주 상태 보여줘</span>
                    <span class="chip">PAY-2026-0015 결재 상신해줘</span>
                </div>
            </div>
        </div>
        <form class="chat-input" id="chatForm">
            <textarea id="msg" rows="1" placeholder="예) 신원전자에 노트북 100대 수주해줘  (Enter 전송 · Shift+Enter 줄바꿈)"
                      autocomplete="off"></textarea>
            <button type="submit" class="btn btn-primary" id="send">
                <i class="bi bi-send"></i>
            </button>
        </form>
    </div>

    <script>
    (function () {
        const log = document.getElementById('log');
        const empty = document.getElementById('empty');
        const form = document.getElementById('chatForm');
        const input = document.getElementById('msg');
        const sendBtn = document.getElementById('send');

        function scrollDown() { log.scrollTop = log.scrollHeight; }

        // 사용자/봇 말풍선 추가. lines 는 배열, textContent 로 넣어 XSS 방지.
        function addMsg(who, lines, kind) {
            if (empty) { empty.remove(); }
            const wrap = document.createElement('div');
            wrap.className = 'msg ' + who;
            const bubble = document.createElement('div');
            bubble.className = 'bubble' + (kind ? ' ' + kind : '');
            (Array.isArray(lines) ? lines : [lines]).forEach((t, i) => {
                if (i) bubble.appendChild(document.createElement('br'));
                bubble.appendChild(document.createTextNode(t));
            });
            wrap.appendChild(bubble);
            log.appendChild(wrap);
            scrollDown();
            return { wrap, bubble };
        }

        // '실행 중…' 임시 말풍선 (응답 오면 제거).
        function addTyping() {
            const m = addMsg('bot', ['⏳ 에이전트가 처리 중입니다…'], null);
            m.wrap.classList.add('typing');
            return m.wrap;
        }

        // plan 응답 → 미리보기 + [실행]/[취소] 버튼. 실행 시 intent 를 confirm=true 로 재전송.
        function addPlan(summary, intent) {
            const m = addMsg('bot', [], 'plan');
            const title = document.createElement('div');
            title.className = 'plan-title';
            title.textContent = '📋 실행 계획 — 확인이 필요합니다';
            m.bubble.appendChild(title);
            summary.forEach((t, i) => {
                if (i) m.bubble.appendChild(document.createElement('br'));
                m.bubble.appendChild(document.createTextNode(t));
            });
            const actions = document.createElement('div');
            actions.className = 'plan-actions';
            const run = document.createElement('button');
            run.className = 'btn btn-sm btn-warning';
            run.innerHTML = '<i class="bi bi-check-lg"></i> 실행';
            const cancel = document.createElement('button');
            cancel.className = 'btn btn-sm btn-outline-secondary';
            cancel.textContent = '취소';
            actions.appendChild(run);
            actions.appendChild(cancel);
            m.bubble.appendChild(actions);
            scrollDown();

            cancel.onclick = () => {
                actions.remove();
                addMsg('bot', ['⏹️ 취소했습니다. (아무것도 생성되지 않음)'], null);
            };
            run.onclick = async () => {
                actions.remove();
                await send({ intent: intent, confirm: true }, false);
            };
        }

        // 에이전트로 전송. showUser=true 면 사용자 말풍선도 그림(1차 입력).
        async function send(payload, showUser) {
            if (showUser) addMsg('user', [payload.message], null);
            const typing = addTyping();
            setBusy(true);
            try {
                const resp = await fetch('/api/assistant/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (resp.status === 401) { window.location.href = '/login'; return; }
                const data = await resp.json().catch(() => ({ type: 'error', lines: ['응답을 해석할 수 없습니다.'] }));
                typing.remove();
                render(data);
            } catch (e) {
                typing.remove();
                addMsg('bot', ['🔌 네트워크 오류 — ' + e.message], 'error');
            } finally {
                setBusy(false);
                input.focus();
            }
        }

        function render(data) {
            if (!data || !data.type) { addMsg('bot', ['빈 응답'], 'error'); return; }
            if (data.type === 'plan')        addPlan(data.summary || [], data.intent || {});
            else if (data.type === 'result') addMsg('bot', data.lines || [], 'result');
            else if (data.type === 'error')  addMsg('bot', data.lines || ['오류'], 'error');
            else                             addMsg('bot', data.lines || [], null); // message
        }

        function setBusy(b) {
            sendBtn.disabled = b;
            input.disabled = b;
        }

        function submit() {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            input.style.height = 'auto';
            send({ message: text }, true);
        }

        form.addEventListener('submit', e => { e.preventDefault(); submit(); });
        // Enter=전송, Shift+Enter=줄바꿈
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
        });
        // 입력에 따라 높이 자동 확장
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        });
        // 예시 칩 클릭 → 입력창에 넣고 바로 전송
        log.addEventListener('click', e => {
            if (e.target.classList.contains('chip')) {
                input.value = e.target.textContent;
                submit();
            }
        });
        input.focus();
    })();
    </script>

</div>
</body>
</html>
