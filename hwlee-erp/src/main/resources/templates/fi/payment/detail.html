<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('입출금 상세', 'payment', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>입출금 상세 <span id="h-number" class="text-muted fs-6 fw-normal"></span></h1>
            <div class="crumb">회계 (FI) · Payment</div>
        </div>
        <a href="/fi/payments" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> 목록</a>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-2">구분</dt>
                <dd class="col-sm-4" id="d-type">-</dd>
                <dt class="col-sm-2">상태</dt>
                <dd class="col-sm-4" id="d-status">-</dd>

                <dt class="col-sm-2">금액</dt>
                <dd class="col-sm-4 fs-5 fw-bold" id="d-amount">-</dd>
                <dt class="col-sm-2">거래일</dt>
                <dd class="col-sm-4" id="d-date">-</dd>

                <dt class="col-sm-2">거래상대</dt>
                <dd class="col-sm-4" id="d-party">-</dd>
                <dt class="col-sm-2">전기 일시</dt>
                <dd class="col-sm-4" id="d-posted">-</dd>

                <dt class="col-sm-2">적요</dt>
                <dd class="col-sm-10" id="d-desc">-</dd>

                <dt class="col-sm-2">등록</dt>
                <dd class="col-sm-10 small text-muted" id="d-audit">-</dd>
            </dl>
        </div>
    </div>

    <div id="actions" class="mb-3"></div>
    <p class="text-muted small">전기(POSTED)된 입출금은 화면에서 수정·취소할 수 없습니다(회계 무결성). 지급(출금)은 전자결재 최종 승인 시 전기됩니다.</p>

<script th:inline="javascript">
    const ID = [[${id}]];
    const TYPE = {
        RECEIPT:      {label: '입금 (고객 수금)',  color: 'success'},
        DISBURSEMENT: {label: '출금 (거래처 지급)', color: 'danger'},
    };
    const STATUS = {
        DRAFT:  {label: '초안',   color: 'secondary'},
        POSTED: {label: '전기됨', color: 'success'},
    };

    let approvalState = null; // 이 지급에 걸린 최신 결재

    async function load() {
        try {
            const p = await ERP.api('/api/payments/' + ID);
            try { approvalState = await ERP.api(`/api/approvals/for?docType=PAYMENT&refId=${ID}`); }
            catch (e) { approvalState = null; } // 204 = 결재 없음
            render(p);
        } catch (e) {
            ERP.flashError(e);
        }
    }

    function render(p) {
        const t = TYPE[p.type] || {label: p.type, color: 'secondary'};
        const s = STATUS[p.status] || {label: p.status, color: 'secondary'};
        document.getElementById('h-number').textContent = p.number;
        document.getElementById('d-type').innerHTML = ERP.badge(t.label, t.color);
        document.getElementById('d-status').innerHTML = ERP.badge(s.label, s.color);
        document.getElementById('d-amount').textContent = ERP.won(p.amount);
        document.getElementById('d-date').textContent = p.paymentDate ?? '-';
        document.getElementById('d-party').textContent = p.type === 'RECEIPT'
            ? `고객 ${p.customerCode ?? '-'}`
            : `거래처 ${p.vendorCode ?? '-'}`;
        document.getElementById('d-posted').textContent =
            p.postedAt ? p.postedAt.replace('T', ' ').slice(0, 16) : '-';
        document.getElementById('d-desc').textContent = p.description || '-';
        document.getElementById('d-audit').textContent =
            `${p.createdBy ?? '?'} · ${(p.createdAt ?? '').replace('T', ' ').slice(0, 16)}`;
        renderActions(p);
    }

    function renderActions(p) {
        const box = document.getElementById('actions');
        const a = approvalState;
        if (p.status !== 'DRAFT') { box.innerHTML = ''; return; } // 전기됨 등: 액션 없음
        if (a && a.status === 'PENDING') {
            box.innerHTML = `<span class="badge badge-soft badge-soft-warning me-2">
                    <i class="bi bi-pen"></i> 결재 진행 중 · ${ERP.esc(a.number)}</span>
                <a href="/approvals" class="btn btn-sm btn-outline-secondary">결재함에서 보기</a>`;
            return;
        }
        if (a && a.status === 'DRAFT') {
            box.innerHTML = `<a href="/approvals" class="btn btn-sm btn-warning">
                <i class="bi bi-arrow-return-left"></i> 반송됨 · 결재함에서 재상신</a>`;
            return;
        }
        let banner = '';
        if (a && a.status === 'REJECTED') {
            const reason = (a.steps || []).filter(s => s.status === 'REJECTED')
                .map(s => s.comment).find(c => c) || '';
            banner = `<div class="alert alert-danger py-2 px-3 small mb-2">
                <i class="bi bi-x-circle"></i> 결재 반려됨 (${ERP.esc(a.number)})${reason ? ' · 사유: ' + ERP.esc(reason) : ''}
                — 내용을 확인하고 다시 상신하세요.</div>`;
        }
        if (p.type === 'DISBURSEMENT') {
            const label = (a && a.status === 'REJECTED') ? '다시 결재 상신' : '결재 상신';
            box.innerHTML = banner + `<button class="btn btn-sm btn-primary" onclick="submitApproval()">
                <i class="bi bi-pen"></i> ${label}</button>`;
        } else {
            box.innerHTML = '<span class="text-muted small">작성 중(초안) 입금 건입니다.</span>';
        }
    }

    async function submitApproval() {
        if (!confirm('이 지급을 결재 상신하시겠습니까? 전결 규정에 따라 결재선이 자동 구성됩니다.')) return;
        try {
            const a = await ERP.api(`/api/payments/${ID}/submit-approval`, {method: 'POST'});
            ERP.flash(`결재 상신 완료 · ${a.number} (결재선 ${(a.steps || []).length}단계)`, 'success');
            load();
        } catch (e) { ERP.flashError(e); }
    }

    document.addEventListener('DOMContentLoaded', load);
</script>
</div>
</body>
</html>
