<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('입출금 작성', 'payment', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>신규 입출금</h1>
            <div class="crumb">회계 (FI) · Payment</div>
        </div>
        <a href="/fi/payments" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> 목록</a>
    </div>

    <form id="form">
        <div class="card form-card mb-3"><div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">구분 <span class="text-danger">*</span></label>
                    <select id="type" class="form-select" required>
                        <option value="RECEIPT">입금 (고객 수금)</option>
                        <option value="DISBURSEMENT">출금 (거래처 지급)</option>
                    </select>
                </div>
                <div class="col-md-5" id="partyWrap">
                    <label class="form-label" id="partyLabel">고객 <span class="text-danger">*</span></label>
                    <select id="party" class="form-select" required><option value="">선택…</option></select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">금액 <span class="text-danger">*</span></label>
                    <input type="number" step="any" min="0" id="amount" class="form-control text-end" required placeholder="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label">거래일 <span class="text-danger">*</span></label>
                    <input type="date" id="paymentDate" class="form-control" required>
                </div>
                <div class="col-md-9">
                    <label class="form-label">적요 <span class="text-muted small">(선택)</span></label>
                    <input type="text" id="description" class="form-control" placeholder="예: 3월 외상대금 회수">
                </div>
            </div>
            <div class="form-text mt-2" id="hint">입금: 차)현금 / 대)매출채권 — 고객이 외상값을 갚는 거래입니다.</div>
        </div></div>

        <div class="form-actions">
            <a href="/fi/payments" class="btn btn-outline-secondary">취소</a>
            <button type="submit" class="btn btn-primary" id="submitBtn">저장(전기)</button>
            <button type="button" class="btn btn-success" id="approvalBtn" style="display:none">
                <i class="bi bi-pen"></i> 결재 상신하여 등록</button>
        </div>
        <div class="form-text mt-1" id="apvHint" style="display:none">
            지급(출금)은 전자결재를 거칩니다 — 초안으로 저장 후 결재선(재무팀장 등)에 상신됩니다. 최종 승인 시 전기·분개됩니다.</div>
    </form>

<script>
    let customers = [], vendors = [];

    async function loadParties() {
        const [c, v] = await Promise.all([
            ERP.api('/api/customers' + ERP.query({status: 'ACTIVE', size: 500})),
            ERP.api('/api/vendors' + ERP.query({status: 'ACTIVE', size: 500})),
        ]);
        customers = c.content || [];
        vendors = v.content || [];
        syncParty();
    }

    // 구분에 따라 거래상대 드롭다운(고객/거래처)·라벨·힌트 전환
    function syncParty() {
        const type = document.getElementById('type').value;
        const isReceipt = type === 'RECEIPT';
        const list = isReceipt ? customers : vendors;
        document.getElementById('partyLabel').innerHTML =
            (isReceipt ? '고객' : '거래처') + ' <span class="text-danger">*</span>';
        const sel = document.getElementById('party');
        sel.innerHTML = ['<option value="">선택…</option>']
            .concat(list.map(o => `<option value="${o.id}">${ERP.esc(o.name)} (${ERP.esc(o.code)})</option>`))
            .join('');
        document.getElementById('hint').textContent = isReceipt
            ? '입금: 차)현금 / 대)매출채권 — 고객이 외상값을 갚는 거래입니다.'
            : '출금: 차)매입채무 / 대)현금 — 거래처에 외상대금을 지급하는 거래입니다.';
        // 출금(지급)일 때만 "결재 상신" 경로 노출.
        document.getElementById('approvalBtn').style.display = isReceipt ? 'none' : '';
        document.getElementById('apvHint').style.display = isReceipt ? 'none' : '';
    }

    function buildBody() {
        const type = document.getElementById('type').value;
        const partyId = Number(document.getElementById('party').value);
        if (!partyId) { ERP.flash('거래상대를 선택하세요.', 'warning'); return null; }
        return {
            type,
            customerId: type === 'RECEIPT' ? partyId : null,
            vendorId: type === 'DISBURSEMENT' ? partyId : null,
            amount: document.getElementById('amount').value,
            paymentDate: document.getElementById('paymentDate').value,
            description: document.getElementById('description').value.trim() || null,
        };
    }

    async function submit(e) {
        e.preventDefault();
        const body = buildBody();
        if (!body) return;
        try {
            const saved = await ERP.api('/api/payments', {method: 'POST', body});
            location.href = '/fi/payments/' + saved.id;
        } catch (err) {
            ERP.flashError(err);
        }
    }

    // 초안 저장 후 결재 상신(출금만). 최종 승인 시 전기·분개.
    async function submitApproval() {
        const body = buildBody();
        if (!body) return;
        if (body.type !== 'DISBURSEMENT') { ERP.flash('결재 상신은 출금(지급)만 가능합니다.', 'warning'); return; }
        try {
            const draft = await ERP.api('/api/payments/draft', {method: 'POST', body});
            const a = await ERP.api(`/api/payments/${draft.id}/submit-approval`, {method: 'POST'});
            ERP.flash(`결재 상신 완료 · ${a.number} (결재선 ${(a.steps || []).length}단계)`, 'success');
            location.href = '/fi/payments/' + draft.id;
        } catch (err) {
            ERP.flashError(err);
        }
    }

    async function init() {
        try {
            await loadParties();
        } catch (err) {
            ERP.flashError(err);
        }
        document.getElementById('type').addEventListener('change', syncParty);
        document.getElementById('form').addEventListener('submit', submit);
        document.getElementById('approvalBtn').addEventListener('click', submitApproval);
        syncParty();
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</div>
</body>
</html>
