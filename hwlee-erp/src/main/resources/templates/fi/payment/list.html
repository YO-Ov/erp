<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('입출금 목록', 'payment', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>입출금</h1>
            <div class="crumb">회계 (FI) · Payment</div>
        </div>
        <a href="/fi/payments/new" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 신규 입출금</a>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-narrow">
            <label>구분</label>
            <select id="f-type" class="form-select form-select-sm">
                <option value="">전체</option>
                <option value="RECEIPT">입금</option>
                <option value="DISBURSEMENT">출금</option>
            </select>
        </div>
        <div class="filter-field ff-range">
            <label>거래일</label>
            <div class="date-range">
                <input type="date" id="f-from" class="form-control form-control-sm">
                <span class="tilde">~</span>
                <input type="date" id="f-to" class="form-control form-control-sm">
            </div>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <!-- 목록 툴바: 조회 건수 + 페이지 크기 + 엑셀 -->
    <div class="list-toolbar">
        <div class="result-count">조회 <b id="totalCount">0</b>건</div>
        <div class="toolbar-right">
            <label class="page-size">표시
                <select id="pageSize" class="form-select form-select-sm">
                    <option value="20">20</option><option value="50">50</option><option value="100">100</option>
                </select>
            </label>
            <button type="button" id="btn-excel" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
            </button>
        </div>
    </div>

    <div class="table-wrap">
    <div class="table-scroll">
    <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
            <th class="text-end" style="width:52px;">No.</th>
            <th class="sortable" data-sort="number">번호<span class="sort-ind"></span></th>
            <th>구분</th><th>거래상대</th>
            <th class="sortable text-end" data-sort="amount">금액<span class="sort-ind"></span></th>
            <th class="sortable" data-sort="paymentDate">거래일<span class="sort-ind"></span></th>
            <th class="sortable" data-sort="status">상태<span class="sort-ind"></span></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="7" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr></tbody>
        <tfoot id="foot"></tfoot>
    </table>
    </div>
    </div>

    <nav class="pager-bar">
        <div class="page-info" id="pageInfo"></div>
        <ul class="pagination pagination-sm mb-0" id="pager"></ul>
    </nav>

<script>
    const TYPE = {
        RECEIPT:      {label: '입금', color: 'success'},
        DISBURSEMENT: {label: '출금', color: 'danger'},
    };
    const STATUS = {
        DRAFT:  {label: '초안',   color: 'secondary'},
        POSTED: {label: '전기됨', color: 'success'},
    };
    let page = 0;
    let SIZE = 20;
    // 정렬 상태 — 백엔드 Pageable 의 sort 파라미터로 전달된다.
    let sortKey = 'id', sortDir = 'desc';
    const sortParam = () => `${sortKey},${sortDir}`;

    function filters() {
        return {
            type: document.getElementById('f-type').value,
            dateFrom: document.getElementById('f-from').value,
            dateTo: document.getElementById('f-to').value,
        };
    }

    function rowHtml(p, i) {
        const t = TYPE[p.type] || {label: p.type, color: 'secondary'};
        const s = STATUS[p.status] || {label: p.status, color: 'secondary'};
        const party = p.type === 'RECEIPT'
            ? `<span class="text-muted small">고객</span> ${ERP.esc(p.customerCode) || '-'}`
            : `<span class="text-muted small">거래처</span> ${ERP.esc(p.vendorCode) || '-'}`;
        const seq = page * SIZE + i + 1;
        return `<tr style="cursor:pointer" onclick="location.href='/fi/payments/${p.id}'">
            <td class="text-end text-muted">${seq}</td>
            <td>${ERP.esc(p.number)}</td>
            <td>${ERP.badge(t.label, t.color)}</td>
            <td>${party}</td>
            <td class="text-end">${ERP.won(p.amount)}</td>
            <td>${p.paymentDate ?? ''}</td>
            <td>${ERP.badge(s.label, s.color)}</td>
        </tr>`;
    }

    function renderFoot(list) {
        const foot = document.getElementById('foot');
        if (list.length === 0) { foot.innerHTML = ''; return; }
        const sum = list.reduce((a, p) => a + Number(p.amount || 0), 0);
        foot.innerHTML = `<tr>
            <td colspan="4" class="text-end text-muted">이 페이지 합계 (${list.length}건)</td>
            <td class="text-end">${ERP.won(sum)}</td>
            <td></td><td></td>
        </tr>`;
    }

    async function load() {
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr>`;
        try {
            const data = await ERP.api('/api/payments' + ERP.query({...filters(), page, size: SIZE, sort: sortParam()}));
            const list = data.content || [];
            document.getElementById('totalCount').textContent = (data.totalElements ?? list.length).toLocaleString('ko-KR');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
                    <i class="bi bi-inbox"></i>조건에 맞는 입출금 내역이 없습니다.</div></td></tr>`;
            } else {
                tbody.innerHTML = list.map(rowHtml).join('');
            }
            renderFoot(list);
            ERP.pager({page, size: SIZE, totalPages: data.totalPages || 0, totalElements: data.totalElements || 0,
                       onGo: p => { page = p; load(); }});
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            document.getElementById('foot').innerHTML = '';
            ERP.flashError(e);
        }
    }

    /** 정렬 헤더 표시(▲▼) 갱신. */
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const ind = th.querySelector('.sort-ind');
            th.classList.remove('asc', 'desc');
            if (th.dataset.sort === sortKey) {
                th.classList.add(sortDir);
                ind.textContent = sortDir === 'asc' ? '▲' : '▼';
            } else {
                ind.textContent = '↕';
            }
        });
    }

    /** 헤더 클릭 → 같은 컬럼이면 방향 토글, 다른 컬럼이면 그 컬럼 기준 정렬. */
    function onSortClick(th) {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = (key === 'amount') ? 'desc' : 'asc';
        }
        page = 0;
        updateSortIndicators();
        load();
    }

    /** 현재 검색 조건 전체를 한 번에 받아 CSV(엑셀)로 내려받기. */
    async function exportExcel() {
        const btn = document.getElementById('btn-excel');
        btn.disabled = true;
        try {
            const data = await ERP.api('/api/payments' + ERP.query({...filters(), page: 0, size: 10000, sort: sortParam()}));
            const list = data.content || [];
            if (list.length === 0) { ERP.flash('내보낼 입출금 내역이 없습니다.', 'warning'); return; }
            const csv = ERP.toCsv(list, [
                {label: '번호', value: p => p.number},
                {label: '구분', value: p => (TYPE[p.type]?.label ?? p.type)},
                {label: '거래상대', value: p => (p.type === 'RECEIPT' ? (p.customerCode ?? '') : (p.vendorCode ?? ''))},
                {label: '금액', value: p => p.amount ?? 0},
                {label: '거래일', value: p => p.paymentDate ?? ''},
                {label: '상태', value: p => (STATUS[p.status]?.label ?? p.status)},
            ]);
            ERP.download(`입출금목록_${ERP.today()}.csv`, csv);
        } catch (e) {
            ERP.flashError(e);
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateSortIndicators();
        load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('searchForm').reset(); page = 0; load();
        });
        document.getElementById('btn-excel').addEventListener('click', exportExcel);
        document.querySelectorAll('th.sortable').forEach(th =>
            th.addEventListener('click', () => onSortClick(th)));
        document.getElementById('pageSize').addEventListener('change', e => {
            SIZE = Number(e.target.value); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
