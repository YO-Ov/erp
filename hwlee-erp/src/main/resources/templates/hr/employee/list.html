<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('직원 목록', 'employee', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>직원</h1>
            <div class="crumb">인사 (HR) · Employee</div>
        </div>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-wide">
            <label>코드·이름</label>
            <input type="text" id="f-keyword" class="form-control form-control-sm" placeholder="코드 또는 이름 검색">
        </div>
        <div class="filter-field ff-narrow">
            <label>상태</label>
            <select id="f-status" class="form-select form-select-sm">
                <option value="">전체</option>
                <option value="ACTIVE">재직</option>
                <option value="INACTIVE">휴직</option>
                <option value="BLOCKED">퇴직</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <!-- 목록 툴바: 조회 건수 + 페이지 크기 + 엑셀 -->
    <div class="list-toolbar">
        <div class="result-count">조회 <b id="totalCount">0</b>건</div>
        <div class="toolbar-right">
            <label class="page-size">표시
                <select id="pageSize" class="form-select form-select-sm">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </label>
            <button type="button" id="btn-excel" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
            </button>
        </div>
    </div>

    <div class="table-wrap">
    <div class="table-scroll">
    <table class="table rtable table-hover table-striped align-middle mb-0">
        <thead>
        <tr>
            <th class="text-end" style="width:52px;">No.</th>
            <th class="sortable" data-sort="code">코드<span class="sort-ind"></span></th>
            <th class="sortable" data-sort="name">이름<span class="sort-ind"></span></th>
            <th>부서</th>
            <th>이메일</th>
            <th class="sortable" data-sort="hireDate">입사일<span class="sort-ind"></span></th>
            <th class="sortable" data-sort="status">상태<span class="sort-ind"></span></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="7" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    </div>

    <nav class="pager-bar">
        <div class="page-info" id="pageInfo"></div>
        <ul class="pagination pagination-sm mb-0" id="pager"></ul>
    </nav>

<script>
    const MSTATUS = {
        ACTIVE:   {label: '재직', color: 'success'},
        INACTIVE: {label: '휴직', color: 'secondary'},
        BLOCKED:  {label: '퇴직', color: 'danger'},
    };
    let all = []; // /api/employees 는 페이징 없이 전체 List 반환 → 클라이언트 필터·정렬·페이징
    let page = 0;
    let SIZE = 20;
    // 정렬 상태 — 클라이언트에서 직접 정렬한다(이 API 는 비페이징 List).
    let sortKey = 'code', sortDir = 'asc';

    async function load() {
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr>`;
        try {
            all = await ERP.api('/api/employees');
            render();
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    function filtered() {
        const kw = document.getElementById('f-keyword').value.trim().toLowerCase();
        const status = document.getElementById('f-status').value;
        const list = all.filter(e =>
            (!status || e.status === status) &&
            (!kw || (e.code || '').toLowerCase().includes(kw) || (e.name || '').toLowerCase().includes(kw)));
        const dir = sortDir === 'asc' ? 1 : -1;
        return list.slice().sort((x, y) => {
            const a = x[sortKey] ?? '', b = y[sortKey] ?? '';
            return (a < b ? -1 : a > b ? 1 : 0) * dir;
        });
    }

    function rowHtml(e, i) {
        const s = MSTATUS[e.status] || {label: e.status, color: 'secondary'};
        const seq = page * SIZE + i + 1;
        return `<tr style="cursor:pointer" onclick="location.href='/hr/employees/${e.id}'">
            <td class="text-end text-muted" data-label="">${seq}</td>
            <td data-label="코드">${ERP.esc(e.code)}</td>
            <td data-label="이름">${ERP.esc(e.name)}</td>
            <td data-label="부서">${ERP.esc(e.departmentName) || '-'} <span class="text-muted small">${ERP.esc(e.departmentCode)}</span></td>
            <td class="text-muted" data-label="이메일">${ERP.esc(e.email) || '-'}</td>
            <td data-label="입사일">${e.hireDate ?? '-'}</td>
            <td data-label="상태">${ERP.badge(s.label, s.color)}</td></tr>`;
    }

    function render() {
        const list = filtered();
        const total = list.length;
        const totalPages = Math.max(1, Math.ceil(total / SIZE));
        if (page >= totalPages) page = totalPages - 1;
        const pageList = list.slice(page * SIZE, page * SIZE + SIZE);

        document.getElementById('totalCount').textContent = total.toLocaleString('ko-KR');
        const tbody = document.getElementById('rows');
        tbody.innerHTML = total === 0
            ? '<tr><td colspan="7"><div class="empty-state"><i class="bi bi-inbox"></i>조건에 맞는 직원이 없습니다.</div></td></tr>'
            : pageList.map(rowHtml).join('');

        ERP.pager({page, size: SIZE, totalPages, totalElements: total,
                   onGo: p => { page = p; render(); }});
    }

    /** 정렬 헤더 표시(▲▼) 갱신. */
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const ind = th.querySelector('.sort-ind');
            th.classList.remove('asc', 'desc');
            if (th.dataset.sort === sortKey) {
                th.classList.add(sortDir);
                ind.textContent = sortDir === 'asc' ? '▲' : '▼';
            } else {
                ind.textContent = '↕';
            }
        });
    }

    /** 헤더 클릭 → 같은 컬럼이면 방향 토글, 다른 컬럼이면 그 컬럼 기준 정렬. */
    function onSortClick(th) {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = 'asc';
        }
        page = 0;
        updateSortIndicators();
        render();
    }

    /** 현재 검색 조건 전체를 CSV(엑셀)로 내려받기. */
    function exportExcel() {
        const btn = document.getElementById('btn-excel');
        btn.disabled = true;
        try {
            const list = filtered();
            if (list.length === 0) { ERP.flash('내보낼 직원이 없습니다.', 'warning'); return; }
            const csv = ERP.toCsv(list, [
                {label: '코드', value: e => e.code},
                {label: '이름', value: e => e.name},
                {label: '부서코드', value: e => e.departmentCode ?? ''},
                {label: '부서명', value: e => e.departmentName ?? ''},
                {label: '이메일', value: e => e.email ?? ''},
                {label: '입사일', value: e => e.hireDate ?? ''},
                {label: '상태', value: e => (MSTATUS[e.status]?.label ?? e.status)},
            ]);
            ERP.download(`직원목록_${ERP.today()}.csv`, csv);
        } catch (e) {
            ERP.flashError(e);
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateSortIndicators();
        load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; render(); });
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('searchForm').reset(); page = 0; render();
        });
        document.getElementById('btn-excel').addEventListener('click', exportExcel);
        document.querySelectorAll('th.sortable').forEach(th =>
            th.addEventListener('click', () => onSortClick(th)));
        document.getElementById('pageSize').addEventListener('change', e => {
            SIZE = Number(e.target.value); page = 0; render();
        });
    });
</script>
</div>
</body>
</html>
