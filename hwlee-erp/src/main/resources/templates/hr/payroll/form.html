<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('급여 계산', 'payroll', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>급여 계산</h1>
            <div class="crumb">인사 (HR) · Payroll Run · 신규</div>
        </div>
        <a href="/hr/payroll-runs" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> 목록</a>
    </div>

    <form id="form">
        <div class="card form-card mb-3"><div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">대상월 <span class="text-danger">*</span></label>
                    <input type="month" id="period" class="form-control" required>
                    <div class="form-text">선택한 달 말일에 유효한 ACTIVE 급여계약을 가진 직원 전원의 명세서를 자동 생성합니다.</div>
                </div>
            </div>
            <div class="alert alert-info mt-3 mb-0 small">
                <i class="bi bi-info-circle"></i>
                급여 = 기본급(만근) + 연장수당(시급×1.5×연장시간). 공제 = 소득세 + 4대보험(직원분).
                생성 시 <strong>초안(DRAFT)</strong>으로 계산만 되며, 회계 전표는 이후 <strong>확정</strong>·<strong>지급</strong> 단계에서 생성됩니다.
            </div>
        </div></div>

        <div class="form-actions">
            <a href="/hr/payroll-runs" class="btn btn-outline-secondary">취소</a>
            <button type="submit" class="btn btn-primary" id="submitBtn">급여 계산(초안 생성)</button>
        </div>
    </form>

<script>
    function pad(n) { return String(n).padStart(2, '0'); }

    async function submit(e) {
        e.preventDefault();
        const period = document.getElementById('period').value; // input[type=month] → "YYYY-MM"
        if (!period) { ERP.flash('대상월을 선택하세요.', 'warning'); return; }
        try {
            const saved = await ERP.api('/api/payroll-runs', {method: 'POST', body: {period}});
            location.href = '/hr/payroll-runs/' + saved.id;
        } catch (err) {
            ERP.flashError(err);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        document.getElementById('period').value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}`;
        document.getElementById('form').addEventListener('submit', submit);
    });
</script>
</div>
</body>
</html>
