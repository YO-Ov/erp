<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>현우-ERP 로그인</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width: 420px; margin-top: 8vh;">
    <h3 class="mb-4 text-center">현우-ERP 로그인</h3>
    <div class="card shadow-sm">
        <div class="card-body">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">이메일</label>
                    <input type="email" class="form-control" id="username"
                           placeholder="kim@hwlee-erp.example" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">비밀번호</label>
                    <input type="password" class="form-control" id="password"
                           placeholder="pass1234" required>
                </div>
                <div id="error" class="alert alert-danger d-none" role="alert"></div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
            </form>
            <hr>
            <small class="text-muted">
                시연 계정 (비밀번호 모두 <code>pass1234</code>):<br>
                · kim@hwlee-erp.example — 영업(SALES)<br>
                · lee@hwlee-erp.example — 재무(FINANCE)<br>
                · admin@hwlee-erp.example — 관리자(ADMIN)
            </small>
        </div>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('error');
        errorBox.classList.add('d-none');
        const resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        if (resp.ok) {
            // 서버가 HttpOnly 쿠키(ACCESS_TOKEN)를 내려준다 → 이후 페이지 요청에 자동 첨부
            window.location.href = '/';
        } else {
            errorBox.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
            errorBox.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
