<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HYUNWOO ERP · 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #151c2c 0%, #1a3a6b 100%);
            font-family: "Inter", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            width: 100%; max-width: 400px; background: #fff;
            border-radius: 14px; box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
            overflow: hidden;
        }
        .login-head { text-align: center; padding: 2.25rem 2rem 1rem; }
        .brand-mark {
            display: inline-flex; align-items: center; justify-content: center;
            width: 56px; height: 56px; border-radius: 14px; background: #206bc4;
            color: #fff; font-size: 1.6rem; margin-bottom: .75rem;
        }
        .login-head h1 { font-size: 1.45rem; font-weight: 700; margin: 0; color: #1c2434; }
        .login-head h1 span { color: #206bc4; }
        .login-head p { color: #98a2b3; font-size: .85rem; margin: .25rem 0 0; }
        .login-body { padding: 1rem 2rem 2rem; }
        .login-body .btn-primary { background: #206bc4; border-color: #206bc4; border-radius: 6px; }
        .login-body .btn-primary:hover { background: #1a589f; border-color: #1a589f; }
        .form-control { border-radius: 6px; }
        .demo-box { background: #f7f9fc; border: 1px solid #e6e8ec; border-radius: 8px; padding: .75rem .9rem; font-size: .78rem; color: #667085; }
        .demo-box code { color: #206bc4; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-head">
        <div class="brand-mark"><i class="bi bi-box-seam"></i></div>
        <h1>HYUNWOO <span>ERP</span></h1>
        <p>통합 자원관리 시스템</p>
    </div>
    <div class="login-body">
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-semibold">이메일</label>
                <input type="email" class="form-control" id="username" placeholder="kim@hyunwoo.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">비밀번호</label>
                <input type="password" class="form-control" id="password" placeholder="pass1234" required>
            </div>
            <div id="error" class="alert alert-danger d-none py-2 small" role="alert"></div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right"></i> 로그인
            </button>
        </form>
        <div class="demo-box mt-3">
            <div class="fw-semibold mb-1 text-dark">시연 계정 · 비밀번호 <code>pass1234</code></div>
            kim@hyunwoo.com — 영업(SALES)<br>
            lee@hyunwoo.com — 재무(FINANCE)<br>
            admin@hyunwoo.com — 관리자(ADMIN)
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('error');
        errorBox.classList.add('d-none');
        const resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        if (resp.ok) {
            window.location.href = '/';
        } else {
            errorBox.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
            errorBox.classList.remove('d-none');
        }
    });
</script>
</body>
</html>
