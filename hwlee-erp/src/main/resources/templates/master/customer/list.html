<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('고객', 'customer', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>고객</h1>
            <div class="crumb">영업 (SD) · 고객 마스터</div>
        </div>
        <a href="/master/customers/new" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 신규 고객</a>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-wide">
            <label>고객명</label>
            <input type="text" id="f-name" class="form-control form-control-sm" placeholder="이름 검색">
        </div>
        <div class="filter-field ff-narrow">
            <label>상태</label>
            <select id="f-status" class="form-select form-select-sm">
                <option value="">전체</option>
                <option value="ACTIVE">활성</option>
                <option value="INACTIVE">비활성</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <!-- 목록 툴바: 조회 건수 + 페이지 크기 + 엑셀 -->
    <div class="list-toolbar">
        <div class="result-count">조회 <b id="totalCount">0</b>건</div>
        <div class="toolbar-right">
            <label class="page-size">표시
                <select id="pageSize" class="form-select form-select-sm">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </label>
            <button type="button" id="btn-excel" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
            </button>
        </div>
    </div>

    <div class="table-wrap">
    <div class="table-scroll">
    <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
            <th class="text-end" style="width:52px;">No.</th>
            <th class="sortable" data-sort="code">코드<span class="sort-ind"></span></th>
            <th class="sortable" data-sort="name">고객명<span class="sort-ind"></span></th>
            <th>사업자번호</th>
            <th class="sortable text-end" data-sort="creditLimit">신용한도<span class="sort-ind"></span></th>
            <th>결제조건</th>
            <th class="sortable" data-sort="status">상태<span class="sort-ind"></span></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="7" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    </div>

    <nav class="pager-bar">
        <div class="page-info" id="pageInfo"></div>
        <ul class="pagination pagination-sm mb-0" id="pager"></ul>
    </nav>

<script>
    const STATUS = {ACTIVE: {label: '활성', color: 'success'}, INACTIVE: {label: '비활성', color: 'secondary'}};
    let page = 0;
    let SIZE = 20;
    // 정렬 상태 — 백엔드 Pageable 의 sort 파라미터로 전달된다.
    let sortKey = 'id', sortDir = 'desc';
    const sortParam = () => `${sortKey},${sortDir}`;

    function filters() {
        return {
            name: document.getElementById('f-name').value,
            status: document.getElementById('f-status').value,
        };
    }

    function rowHtml(c, i) {
        const s = STATUS[c.status] || {label: c.status, color: 'secondary'};
        const zero = Number(c.creditLimit) === 0;
        const seq = page * SIZE + i + 1;
        return `<tr style="cursor:pointer" onclick="location.href='/master/customers/${c.id}'">
            <td class="text-end text-muted">${seq}</td>
            <td>${ERP.esc(c.code)}</td>
            <td>${ERP.esc(c.name)}</td>
            <td class="small">${ERP.esc(c.businessNo)}</td>
            <td class="text-end ${zero ? 'text-muted' : ''}">${ERP.won(c.creditLimit)}${zero ? ' <span class="badge badge-soft badge-soft-secondary">현금</span>' : ''}</td>
            <td>${ERP.esc(c.paymentTerms)}</td>
            <td>${ERP.badge(s.label, s.color)}</td></tr>`;
    }

    async function load() {
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr>`;
        try {
            const q = ERP.query({...filters(), page, size: SIZE, sort: sortParam()});
            const data = await ERP.api('/api/customers' + q);
            const list = data.content || [];
            document.getElementById('totalCount').textContent = (data.totalElements ?? list.length).toLocaleString('ko-KR');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
                    <i class="bi bi-inbox"></i>조건에 맞는 고객이 없습니다.</div></td></tr>`;
            } else {
                tbody.innerHTML = list.map(rowHtml).join('');
            }
            ERP.pager({page, size: SIZE, totalPages: data.totalPages || 0, totalElements: data.totalElements || 0,
                       onGo: p => { page = p; load(); }});
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    /** 정렬 헤더 표시(▲▼) 갱신. */
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const ind = th.querySelector('.sort-ind');
            th.classList.remove('asc', 'desc');
            if (th.dataset.sort === sortKey) {
                th.classList.add(sortDir);
                ind.textContent = sortDir === 'asc' ? '▲' : '▼';
            } else {
                ind.textContent = '↕';
            }
        });
    }

    /** 헤더 클릭 → 같은 컬럼이면 방향 토글, 다른 컬럼이면 그 컬럼 기준 정렬. */
    function onSortClick(th) {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = (key === 'creditLimit') ? 'desc' : 'asc';
        }
        page = 0;
        updateSortIndicators();
        load();
    }

    /** 현재 검색 조건 전체를 한 번에 받아 CSV(엑셀)로 내려받기. */
    async function exportExcel() {
        const btn = document.getElementById('btn-excel');
        btn.disabled = true;
        try {
            const q = ERP.query({...filters(), page: 0, size: 10000, sort: sortParam()});
            const data = await ERP.api('/api/customers' + q);
            const list = data.content || [];
            if (list.length === 0) { ERP.flash('내보낼 고객이 없습니다.', 'warning'); return; }
            const csv = ERP.toCsv(list, [
                {label: '코드', value: c => c.code},
                {label: '고객명', value: c => c.name},
                {label: '사업자번호', value: c => c.businessNo},
                {label: '신용한도', value: c => c.creditLimit ?? 0},
                {label: '결제조건', value: c => c.paymentTerms},
                {label: '상태', value: c => (STATUS[c.status]?.label ?? c.status)},
            ]);
            ERP.download(`고객목록_${ERP.today()}.csv`, csv);
        } catch (e) {
            ERP.flashError(e);
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateSortIndicators();
        load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-reset').addEventListener('click', () => { document.getElementById('searchForm').reset(); page = 0; load(); });
        document.getElementById('btn-excel').addEventListener('click', exportExcel);
        document.querySelectorAll('th.sortable').forEach(th =>
            th.addEventListener('click', () => onSortClick(th)));
        document.getElementById('pageSize').addEventListener('change', e => {
            SIZE = Number(e.target.value); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
