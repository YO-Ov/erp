<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>현우-ERP 메뉴</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">현우-ERP</span>
    <span class="text-light ms-auto me-3">
        <span sec:authentication="name">사용자</span> 님
    </span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">로그아웃</button>
</nav>

<div class="container mt-4">
    <h4 class="mb-3">내 역할로 접근 가능한 메뉴</h4>
    <div class="row g-3">
        <div class="col-md-4" sec:authorize="hasAnyRole('SALES','ADMIN')">
            <div class="card"><div class="card-body">
                <h5 class="card-title">영업 (SD)</h5>
                <p class="card-text text-muted">수주 / 견적 / 출하 / 인보이스</p>
                <a class="btn btn-sm btn-primary" href="/swagger-ui.html">API 열기</a>
            </div></div>
        </div>
        <div class="col-md-4" sec:authorize="hasAnyRole('PURCHASING','ADMIN')">
            <div class="card"><div class="card-body">
                <h5 class="card-title">자재 (MM)</h5>
                <p class="card-text text-muted">재고 / 입고 / 출고 / 창고</p>
                <a class="btn btn-sm btn-primary" href="/swagger-ui.html">API 열기</a>
            </div></div>
        </div>
        <div class="col-md-4" sec:authorize="hasAnyRole('FINANCE','ADMIN')">
            <div class="card"><div class="card-body">
                <h5 class="card-title">회계 (FI)</h5>
                <p class="card-text text-muted">전표 / 계정 / 입출금</p>
                <a class="btn btn-sm btn-primary" href="/swagger-ui.html">API 열기</a>
            </div></div>
        </div>
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <div class="card border-warning"><div class="card-body">
                <h5 class="card-title">관리자</h5>
                <p class="card-text text-muted">사용자/역할 관리, 감사 로그</p>
                <a class="btn btn-sm btn-warning" href="/admin/users">사용자 관리</a>
                <a class="btn btn-sm btn-outline-warning" href="/admin/roles">역할 보기</a>
            </div></div>
        </div>
    </div>
    <p class="text-muted mt-4">
        역할이 없으면 위 메뉴가 보이지 않습니다(인증은 됐으나 인가 권한 없음 → API 호출 시 403).
    </p>
</div>

<script>
    async function logout() {
        await fetch('/api/auth/logout', {method: 'POST'});
        window.location.href = '/login';
    }
</script>
</body>
</html>
