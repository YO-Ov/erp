<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('재고 현황', 'stock', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>재고 현황</h1>
            <div class="crumb">자재 (MM) · Stock</div>
        </div>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-wide">
            <label>품목</label>
            <select id="f-item" class="form-select form-select-sm"><option value="">전체</option></select>
        </div>
        <div class="filter-field">
            <label>창고</label>
            <select id="f-warehouse" class="form-select form-select-sm"><option value="">전체</option></select>
        </div>
        <div class="filter-field ff-narrow">
            <label>재고</label>
            <select id="f-qtygt" class="form-select form-select-sm">
                <option value="">전체</option>
                <option value="0">0 초과만</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <div class="table-wrap">
    <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
            <th>품목</th><th>창고</th>
            <th class="text-end">재고 수량</th><th class="text-end">평균 단가</th>
            <th>갱신</th><th style="width:80px;"></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="6" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    <nav class="mt-3"><ul class="pagination pagination-sm" id="pager"></ul></nav>

<script>
    let page = 0;
    const SIZE = 10;

    async function loadItems() {
        try {
            const data = await ERP.api('/api/items' + ERP.query({status: 'ACTIVE', size: 500}));
            fill('f-item', (data.content || []).map(i => [i.id, `${i.name} (${i.code})`]));
        } catch (e) {}
    }
    async function loadWarehouses() {
        try {
            const data = await ERP.api('/api/warehouses' + ERP.query({status: 'ACTIVE', size: 200}));
            fill('f-warehouse', (data.content || []).map(w => [w.id, `${w.name} (${w.code})`]));
        } catch (e) {}
    }
    function fill(id, pairs) {
        const sel = document.getElementById(id);
        pairs.forEach(([v, t]) => { const o = document.createElement('option'); o.value = v; o.textContent = t; sel.appendChild(o); });
    }

    function filters() {
        return {
            itemId: document.getElementById('f-item').value,
            warehouseId: document.getElementById('f-warehouse').value,
            qtyGt: document.getElementById('f-qtygt').value,
        };
    }

    async function load() {
        const tbody = document.getElementById('rows');
        try {
            const data = await ERP.api('/api/stocks' + ERP.query({...filters(), page, size: SIZE, sort: 'id,desc'}));
            const list = data.content || [];
            tbody.innerHTML = list.length === 0
                ? '<tr><td colspan="6" class="text-center text-muted py-4">재고가 없습니다.</td></tr>'
                : list.map(s => `<tr style="cursor:pointer" onclick="location.href='/mm/stocks/${s.id}'">
                        <td>${ERP.esc(s.itemName)} <span class="text-muted small">${ERP.esc(s.itemCode)}</span></td>
                        <td>${ERP.esc(s.warehouseName)} <span class="text-muted small">${ERP.esc(s.warehouseCode)}</span></td>
                        <td class="text-end">${ERP.num(s.qtyOnHand)}</td>
                        <td class="text-end">${ERP.won(s.averageCost)}</td>
                        <td class="small text-muted">${(s.updatedAt ?? '').replace('T', ' ').slice(0, 16)}</td>
                        <td><a class="btn btn-sm btn-outline-secondary" href="/mm/stocks/${s.id}"
                               onclick="event.stopPropagation()">상세</a></td></tr>`).join('');
            renderPager(data.totalPages || 0, data.number || 0);
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    function renderPager(totalPages, current) {
        const pager = document.getElementById('pager');
        if (totalPages <= 1) { pager.innerHTML = ''; return; }
        let html = '';
        for (let i = 0; i < totalPages; i++)
            html += `<li class="page-item ${i === current ? 'active' : ''}">
                <a class="page-link" href="#" onclick="goto(${i});return false;">${i + 1}</a></li>`;
        pager.innerHTML = html;
    }
    function goto(p) { page = p; load(); }

    document.addEventListener('DOMContentLoaded', () => {
        loadItems(); loadWarehouses(); load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('searchForm').reset(); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
