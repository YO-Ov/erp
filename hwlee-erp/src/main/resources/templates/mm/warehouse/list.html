<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('창고 목록', 'warehouse', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>창고</h1>
            <div class="crumb">자재 (MM) · Warehouse</div>
        </div>
        <a href="/mm/warehouses/new" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 신규 창고</a>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-wide">
            <label>이름</label>
            <input type="text" id="f-name" class="form-control form-control-sm" placeholder="창고명 검색">
        </div>
        <div class="filter-field ff-narrow">
            <label>상태</label>
            <select id="f-status" class="form-select form-select-sm">
                <option value="">전체</option>
                <option value="ACTIVE">활성</option>
                <option value="INACTIVE">휴면</option>
                <option value="BLOCKED">정지</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <div class="table-wrap">
    <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
            <th>코드</th><th>이름</th><th>주소</th><th>상태</th><th style="width:80px;"></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="5" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    <nav class="mt-3"><ul class="pagination pagination-sm" id="pager"></ul></nav>
</div>

<script>
    const STATUS = {
        ACTIVE:   {label: '활성', color: 'success'},
        INACTIVE: {label: '휴면', color: 'secondary'},
        BLOCKED:  {label: '정지', color: 'danger'},
    };
    let page = 0;
    const SIZE = 10;

    function filters() {
        return {
            name: document.getElementById('f-name').value,
            status: document.getElementById('f-status').value,
        };
    }

    async function load() {
        const tbody = document.getElementById('rows');
        try {
            const data = await ERP.api('/api/warehouses' + ERP.query({...filters(), page, size: SIZE, sort: 'code,asc'}));
            const list = data.content || [];
            tbody.innerHTML = list.length === 0
                ? '<tr><td colspan="5" class="text-center text-muted py-4">창고가 없습니다.</td></tr>'
                : list.map(w => {
                    const s = STATUS[w.status] || {label: w.status, color: 'secondary'};
                    return `<tr style="cursor:pointer" onclick="location.href='/mm/warehouses/${w.id}'">
                        <td>${ERP.esc(w.code)}</td>
                        <td>${ERP.esc(w.name)}</td>
                        <td class="text-muted">${ERP.esc(w.address) || '-'}</td>
                        <td>${ERP.badge(s.label, s.color)}</td>
                        <td><a class="btn btn-sm btn-outline-secondary" href="/mm/warehouses/${w.id}"
                               onclick="event.stopPropagation()">상세</a></td></tr>`;
                }).join('');
            renderPager(data.totalPages || 0, data.number || 0);
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    function renderPager(totalPages, current) {
        const pager = document.getElementById('pager');
        if (totalPages <= 1) { pager.innerHTML = ''; return; }
        let html = '';
        for (let i = 0; i < totalPages; i++)
            html += `<li class="page-item ${i === current ? 'active' : ''}">
                <a class="page-link" href="#" onclick="goto(${i});return false;">${i + 1}</a></li>`;
        pager.innerHTML = html;
    }
    function goto(p) { page = p; load(); }

    document.addEventListener('DOMContentLoaded', () => {
        load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('searchForm').reset(); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
