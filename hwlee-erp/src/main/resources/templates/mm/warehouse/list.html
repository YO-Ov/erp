<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('창고 목록', 'warehouse', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>창고</h1>
            <div class="crumb">자재 (MM) · Warehouse</div>
        </div>
        <a href="/mm/warehouses/new" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 신규 창고</a>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-wide">
            <label>이름</label>
            <input type="text" id="f-name" class="form-control form-control-sm" placeholder="창고명 검색">
        </div>
        <div class="filter-field ff-narrow">
            <label>상태</label>
            <select id="f-status" class="form-select form-select-sm">
                <option value="">전체</option>
                <option value="ACTIVE">활성</option>
                <option value="INACTIVE">휴면</option>
                <option value="BLOCKED">정지</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <!-- 목록 툴바: 조회 건수 + 페이지 크기 + 엑셀 -->
    <div class="list-toolbar">
        <div class="result-count">조회 <b id="totalCount">0</b>건</div>
        <div class="toolbar-right">
            <label class="page-size">표시
                <select id="pageSize" class="form-select form-select-sm">
                    <option value="20">20</option><option value="50">50</option><option value="100">100</option>
                </select>
            </label>
            <button type="button" id="btn-excel" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
            </button>
        </div>
    </div>

    <div class="table-wrap">
    <div class="table-scroll">
    <table class="table rtable table-hover align-middle mb-0">
        <thead>
        <tr>
            <th class="text-end" style="width:52px;">No.</th>
            <th class="sortable" data-sort="code">코드<span class="sort-ind"></span></th>
            <th class="sortable" data-sort="name">이름<span class="sort-ind"></span></th>
            <th>주소</th>
            <th class="sortable" data-sort="status">상태<span class="sort-ind"></span></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="5" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    </div>

    <nav class="pager-bar">
        <div class="page-info" id="pageInfo"></div>
        <ul class="pagination pagination-sm mb-0" id="pager"></ul>
    </nav>

<script>
    const STATUS = {
        ACTIVE:   {label: '활성', color: 'success'},
        INACTIVE: {label: '휴면', color: 'secondary'},
        BLOCKED:  {label: '정지', color: 'danger'},
    };
    let page = 0;
    let SIZE = 20;
    // 정렬 상태 — 백엔드 Pageable 의 sort 파라미터로 전달된다.
    let sortKey = 'code', sortDir = 'asc';
    const sortParam = () => `${sortKey},${sortDir}`;

    function filters() {
        return {
            name: document.getElementById('f-name').value,
            status: document.getElementById('f-status').value,
        };
    }

    async function load() {
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr>`;
        try {
            const data = await ERP.api('/api/warehouses' + ERP.query({...filters(), page, size: SIZE, sort: sortParam()}));
            const list = data.content || [];
            document.getElementById('totalCount').textContent = (data.totalElements ?? list.length).toLocaleString('ko-KR');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
                    <i class="bi bi-inbox"></i>조건에 맞는 창고가 없습니다.</div></td></tr>`;
            } else {
                tbody.innerHTML = list.map((w, i) => {
                    const s = STATUS[w.status] || {label: w.status, color: 'secondary'};
                    return `<tr style="cursor:pointer" onclick="location.href='/mm/warehouses/${w.id}'">
                        <td class="text-end text-muted" data-label="">${page * SIZE + i + 1}</td>
                        <td data-label="코드">${ERP.esc(w.code)}</td>
                        <td data-label="이름">${ERP.esc(w.name)}</td>
                        <td class="text-muted" data-label="주소">${ERP.esc(w.address) || '-'}</td>
                        <td data-label="상태">${ERP.badge(s.label, s.color)}</td></tr>`;
                }).join('');
            }
            ERP.pager({page, size: SIZE, totalPages: data.totalPages || 0, totalElements: data.totalElements || 0,
                       onGo: p => { page = p; load(); }});
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    /** 정렬 헤더 표시(▲▼) 갱신. */
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const ind = th.querySelector('.sort-ind');
            th.classList.remove('asc', 'desc');
            if (th.dataset.sort === sortKey) {
                th.classList.add(sortDir);
                ind.textContent = sortDir === 'asc' ? '▲' : '▼';
            } else {
                ind.textContent = '↕';
            }
        });
    }

    /** 헤더 클릭 → 같은 컬럼이면 방향 토글, 다른 컬럼이면 그 컬럼 기준 정렬. */
    function onSortClick(th) {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = 'asc';
        }
        page = 0;
        updateSortIndicators();
        load();
    }

    /** 현재 검색 조건 전체를 한 번에 받아 CSV(엑셀)로 내려받기. */
    async function exportExcel() {
        const btn = document.getElementById('btn-excel');
        btn.disabled = true;
        try {
            const data = await ERP.api('/api/warehouses' + ERP.query({...filters(), page: 0, size: 10000, sort: sortParam()}));
            const list = data.content || [];
            if (list.length === 0) { ERP.flash('내보낼 창고가 없습니다.', 'warning'); return; }
            const csv = ERP.toCsv(list, [
                {label: '코드', value: w => w.code},
                {label: '이름', value: w => w.name},
                {label: '주소', value: w => w.address ?? ''},
                {label: '상태', value: w => (STATUS[w.status]?.label ?? w.status)},
            ]);
            ERP.download(`창고목록_${ERP.today()}.csv`, csv);
        } catch (e) {
            ERP.flashError(e);
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateSortIndicators();
        load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('searchForm').reset(); page = 0; load();
        });
        document.getElementById('btn-excel').addEventListener('click', exportExcel);
        document.querySelectorAll('th.sortable').forEach(th =>
            th.addEventListener('click', () => onSortClick(th)));
        document.getElementById('pageSize').addEventListener('change', e => {
            SIZE = Number(e.target.value); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
