<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('알림', '', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>알림</h1>
            <div class="crumb">내 알림함 · Notifications</div>
        </div>
        <button type="button" id="btn-read-all" class="btn btn-outline-secondary">
            <i class="bi bi-check2-all"></i> 모두 읽음
        </button>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-narrow">
            <label>구분</label>
            <select id="f-unread" class="form-select form-select-sm">
                <option value="false">전체</option>
                <option value="true">안 읽음만</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 조회</button>
        </div>
    </form>

    <!-- 목록 툴바: 조회 건수 + 페이지 크기 + 엑셀 -->
    <div class="list-toolbar">
        <div class="result-count">조회 <b id="totalCount">0</b>건</div>
        <div class="toolbar-right">
            <label class="page-size">표시
                <select id="pageSize" class="form-select form-select-sm">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </label>
            <button type="button" id="btn-excel" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
            </button>
        </div>
    </div>

    <div class="table-wrap">
    <div class="table-scroll">
    <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
            <th class="text-end" style="width:52px;">No.</th>
            <th style="width:44px;"></th>
            <th>내용</th>
            <th class="sortable" data-sort="createdAt" style="width:140px;">받은 시각<span class="sort-ind"></span></th>
            <th class="sortable" data-sort="read" style="width:90px;">상태<span class="sort-ind"></span></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="5" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    </div>

    <nav class="pager-bar">
        <div class="page-info" id="pageInfo"></div>
        <ul class="pagination pagination-sm mb-0" id="pager"></ul>
    </nav>

<script>
    const TYPE_ICON = {
        PRODUCTION_CANCELLED:     {icon: 'bi-x-octagon', color: '#d63939', label: '생산 취소'},
        CREDIT_REQUEST_SUBMITTED: {icon: 'bi-shield-exclamation', color: '#f59f00', label: '여신 요청'},
        CREDIT_REQUEST_APPROVED:  {icon: 'bi-check-circle', color: '#2fb344', label: '여신 승인'},
        CREDIT_REQUEST_REJECTED:  {icon: 'bi-x-circle', color: '#d63939', label: '여신 거부'},
    };
    let page = 0;
    let SIZE = 20;
    // 정렬 상태 — 백엔드 Pageable 의 sort 파라미터로 전달된다.
    let sortKey = 'id', sortDir = 'desc';
    const sortParam = () => `${sortKey},${sortDir}`;

    function fmt(iso) { return iso ? new Date(iso).toLocaleString('ko-KR') : ''; }

    function filters() {
        return {unreadOnly: document.getElementById('f-unread').value};
    }

    function rowHtml(n, i) {
        const t = TYPE_ICON[n.type] || {icon: 'bi-info-circle', color: '#206bc4', label: '알림'};
        const seq = page * SIZE + i + 1;
        const clickable = n.linkUrl ? `style="cursor:pointer" onclick='openNotif(${n.id}, ${JSON.stringify(n.linkUrl)})'` : '';
        const dot = n.read ? '' : '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#206bc4;margin-right:6px;vertical-align:middle;"></span>';
        return `<tr ${clickable} class="${n.read ? '' : 'table-active'}">
            <td class="text-end text-muted">${seq}</td>
            <td class="text-center"><i class="bi ${t.icon}" style="color:${t.color};font-size:1.2rem"></i></td>
            <td>
                <div class="${n.read ? '' : 'fw-bold'}">${dot}${ERP.esc(n.title)} ${n.linkUrl ? '<i class="bi bi-box-arrow-up-right text-muted small"></i>' : ''}</div>
                <div class="small text-muted">${ERP.esc(n.message)}</div>
            </td>
            <td class="small">${fmt(n.createdAt)}</td>
            <td>${n.read ? ERP.badge('읽음', 'secondary') : ERP.badge('새 알림', 'primary')}</td>
        </tr>`;
    }

    async function load() {
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr>`;
        try {
            const q = ERP.query({...filters(), page, size: SIZE, sort: sortParam()});
            const data = await ERP.api('/api/notifications' + q);
            const list = data.content || [];
            document.getElementById('totalCount').textContent = (data.totalElements ?? list.length).toLocaleString('ko-KR');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
                    <i class="bi bi-inbox"></i>조건에 맞는 알림이 없습니다.</div></td></tr>`;
            } else {
                tbody.innerHTML = list.map(rowHtml).join('');
            }
            ERP.pager({page, size: SIZE, totalPages: data.totalPages || 0, totalElements: data.totalElements || 0,
                       onGo: p => { page = p; load(); }});
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    async function openNotif(id, url) {
        try { await ERP.api(`/api/notifications/${id}/read`, {method: 'POST'}); } catch (e) {}
        if (url) window.location.href = url;
    }

    async function readAll() {
        try {
            await ERP.api('/api/notifications/read-all', {method: 'POST'});
            ERP.flash('모두 읽음 처리했습니다.', 'success');
            load();
        } catch (e) { ERP.flashError(e); }
    }

    /** 정렬 헤더 표시(▲▼) 갱신. */
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const ind = th.querySelector('.sort-ind');
            th.classList.remove('asc', 'desc');
            if (th.dataset.sort === sortKey) {
                th.classList.add(sortDir);
                ind.textContent = sortDir === 'asc' ? '▲' : '▼';
            } else {
                ind.textContent = '↕';
            }
        });
    }

    /** 헤더 클릭 → 같은 컬럼이면 방향 토글, 다른 컬럼이면 그 컬럼 기준 정렬. */
    function onSortClick(th) {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = (key === 'createdAt') ? 'desc' : 'asc';
        }
        page = 0;
        updateSortIndicators();
        load();
    }

    /** 현재 검색 조건 전체를 한 번에 받아 CSV(엑셀)로 내려받기. */
    async function exportExcel() {
        const btn = document.getElementById('btn-excel');
        btn.disabled = true;
        try {
            const q = ERP.query({...filters(), page: 0, size: 10000, sort: sortParam()});
            const data = await ERP.api('/api/notifications' + q);
            const list = data.content || [];
            if (list.length === 0) { ERP.flash('내보낼 알림이 없습니다.', 'warning'); return; }
            const csv = ERP.toCsv(list, [
                {label: '구분', value: n => (TYPE_ICON[n.type]?.label ?? n.type)},
                {label: '제목', value: n => n.title},
                {label: '내용', value: n => n.message},
                {label: '받은 시각', value: n => fmt(n.createdAt)},
                {label: '상태', value: n => (n.read ? '읽음' : '새 알림')},
            ]);
            ERP.download(`알림목록_${ERP.today()}.csv`, csv);
        } catch (e) {
            ERP.flashError(e);
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateSortIndicators();
        load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-read-all').addEventListener('click', readAll);
        document.getElementById('btn-excel').addEventListener('click', exportExcel);
        document.querySelectorAll('th.sortable').forEach(th =>
            th.addEventListener('click', () => onSortClick(th)));
        document.getElementById('pageSize').addEventListener('change', e => {
            SIZE = Number(e.target.value); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
