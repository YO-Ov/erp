<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('BOM', 'bom', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>BOM</h1>
            <div class="crumb">생산 (PP) · Bill of Materials</div>
        </div>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-wide">
            <label>완제품</label>
            <select id="f-product" class="form-select form-select-sm"><option value="">완제품 선택…</option></select>
        </div>
    </form>

    <div class="card mb-3" id="bomCard" style="display:none">
        <div class="card-header">부품 구성 <span id="prodName" class="text-muted small"></span></div>
        <div class="card-body">
            <!-- 목록 툴바: 조회 건수 + 엑셀 -->
            <div class="list-toolbar">
                <div class="result-count">조회 <b id="totalCount">0</b>건</div>
                <div class="toolbar-right">
                    <button type="button" id="btn-excel" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
                    </button>
                </div>
            </div>

            <div class="table-scroll">
            <table class="table rtable line-table align-middle mb-0">
                <thead>
                <tr>
                    <th class="text-end" style="width:52px;">No.</th>
                    <th class="sortable" data-sort="componentCode">부품 코드<span class="sort-ind"></span></th>
                    <th>부품명</th>
                    <th class="sortable text-end" data-sort="quantity">소요량(완제품 1개당)<span class="sort-ind"></span></th>
                    <th style="width:60px;"></th>
                </tr>
                </thead>
                <tbody id="rows"><tr><td colspan="5" class="text-center text-muted py-3">완제품을 선택하세요.</td></tr></tbody>
            </table>
            </div>

            <form id="addForm" class="row g-2 mt-3">
                <div class="col-md-5">
                    <label class="form-label">부품 추가</label>
                    <select id="a-component" class="form-select form-select-sm"><option value="">부품 선택…</option></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">소요량</label>
                    <input type="number" step="any" min="0" id="a-qty" class="form-control form-control-sm text-end" placeholder="1">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-sm btn-primary">＋ 부품 추가</button>
                </div>
            </form>
        </div>
    </div>

<script>
    let finished = [], components = [];
    // 현재 표시 중인 BOM 라인(엑셀/정렬 재사용). 서버가 배열로 내려주므로 정렬은 클라이언트에서.
    let bomRows = [];
    let sortKey = 'componentCode', sortDir = 'asc';

    async function loadItems() {
        const data = await ERP.api('/api/items' + ERP.query({status: 'ACTIVE', size: 500}));
        const list = data.content || [];
        finished = list.filter(i => i.itemType === 'FINISHED');
        components = list.filter(i => i.itemType === 'COMPONENT');
        fill('f-product', finished, '완제품 선택…');
        fill('a-component', components, '부품 선택…');
    }
    function fill(id, items, placeholder) {
        const sel = document.getElementById(id);
        sel.innerHTML = [`<option value="">${placeholder}</option>`]
            .concat(items.map(i => `<option value="${i.id}">${ERP.esc(i.name)} (${ERP.esc(i.code)})</option>`)).join('');
    }

    function currentProductId() { return document.getElementById('f-product').value; }

    async function loadBom() {
        const pid = currentProductId();
        const card = document.getElementById('bomCard');
        if (!pid) { card.style.display = 'none'; return; }
        card.style.display = '';
        const p = finished.find(f => String(f.id) === String(pid));
        document.getElementById('prodName').textContent = p ? `— ${p.name} (${p.code})` : '';
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-3">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr>`;
        try {
            bomRows = await ERP.api('/api/boms' + ERP.query({productItemId: pid})) || [];
            renderRows();
        } catch (e) {
            bomRows = [];
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-3">불러오기 실패</td></tr>';
            document.getElementById('totalCount').textContent = '0';
            ERP.flashError(e);
        }
    }

    /** 현재 정렬 기준으로 bomRows 를 정렬해 그린다(서버 미지원이라 클라이언트 정렬). */
    function renderRows() {
        const tbody = document.getElementById('rows');
        document.getElementById('totalCount').textContent = bomRows.length.toLocaleString('ko-KR');
        if (bomRows.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
                <i class="bi bi-inbox"></i>등록된 부품이 없습니다. 아래에서 추가하세요.</div></td></tr>`;
            return;
        }
        const dir = sortDir === 'asc' ? 1 : -1;
        const sorted = [...bomRows].sort((a, b) => {
            let va = a[sortKey], vb = b[sortKey];
            if (sortKey === 'quantity') { va = Number(va || 0); vb = Number(vb || 0); return (va - vb) * dir; }
            return String(va ?? '').localeCompare(String(vb ?? ''), 'ko') * dir;
        });
        tbody.innerHTML = sorted.map((b, i) => `<tr>
            <td class="text-end text-muted" data-label="">${i + 1}</td>
            <td data-label="부품 코드">${ERP.esc(b.componentCode)}</td>
            <td data-label="부품명">${ERP.esc(b.componentName)}</td>
            <td class="text-end" data-label="소요량(완제품 1개당)">${ERP.num(b.quantity)}</td>
            <td data-label=""><button class="btn btn-sm btn-outline-danger" onclick="del(${b.id})">✕</button></td></tr>`).join('');
    }

    /** 정렬 헤더 표시(▲▼) 갱신. */
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const ind = th.querySelector('.sort-ind');
            th.classList.remove('asc', 'desc');
            if (th.dataset.sort === sortKey) {
                th.classList.add(sortDir);
                ind.textContent = sortDir === 'asc' ? '▲' : '▼';
            } else {
                ind.textContent = '↕';
            }
        });
    }

    /** 헤더 클릭 → 같은 컬럼이면 방향 토글, 다른 컬럼이면 그 컬럼 기준 정렬. */
    function onSortClick(th) {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = (key === 'quantity') ? 'desc' : 'asc';
        }
        updateSortIndicators();
        renderRows();
    }

    /** 현재 BOM 라인을 CSV(엑셀)로 내려받기. */
    function exportExcel() {
        if (bomRows.length === 0) { ERP.flash('내보낼 부품이 없습니다.', 'warning'); return; }
        const csv = ERP.toCsv(bomRows, [
            {label: '부품코드', value: b => b.componentCode},
            {label: '부품명', value: b => b.componentName},
            {label: '소요량', value: b => b.quantity ?? 0},
        ]);
        ERP.download(`BOM목록_${ERP.today()}.csv`, csv);
    }

    async function addBom(e) {
        e.preventDefault();
        const pid = currentProductId();
        const cid = document.getElementById('a-component').value;
        const qty = document.getElementById('a-qty').value;
        if (!pid) { ERP.flash('완제품을 먼저 선택하세요.', 'warning'); return; }
        if (!cid || !qty) { ERP.flash('부품과 소요량을 입력하세요.', 'warning'); return; }
        try {
            await ERP.api('/api/boms', {method: 'POST',
                body: {productItemId: Number(pid), componentItemId: Number(cid), quantity: qty}});
            document.getElementById('a-component').value = '';
            document.getElementById('a-qty').value = '';
            loadBom();
        } catch (err) { ERP.flashError(err); }
    }

    async function del(id) {
        if (!confirm('이 부품을 BOM에서 삭제하시겠습니까?')) return;
        try { await ERP.api('/api/boms/' + id, {method: 'DELETE'}); loadBom(); }
        catch (e) { ERP.flashError(e); }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        try { await loadItems(); } catch (e) { ERP.flashError(e); }
        updateSortIndicators();
        document.getElementById('f-product').addEventListener('change', loadBom);
        document.getElementById('addForm').addEventListener('submit', addBom);
        document.getElementById('btn-excel').addEventListener('click', exportExcel);
        document.querySelectorAll('th.sortable').forEach(th =>
            th.addEventListener('click', () => onSortClick(th)));
    });
</script>
</div>
</body>
</html>
