<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('생산지시 목록', 'production', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>생산지시</h1>
            <div class="crumb">생산 (PP) · Production Order</div>
        </div>
        <a href="/pp/production-orders/new" class="btn btn-primary"><i class="bi bi-plus-lg"></i> 신규 생산지시</a>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-wide">
            <label>완제품</label>
            <select id="f-product" class="form-select form-select-sm"><option value="">전체</option></select>
        </div>
        <div class="filter-field ff-narrow">
            <label>상태</label>
            <select id="f-status" class="form-select form-select-sm">
                <option value="">전체</option>
                <option value="PLANNED">계획</option>
                <option value="RELEASED">착수</option>
                <option value="COMPLETED">완료</option>
                <option value="CANCELLED">취소</option>
            </select>
        </div>
        <div class="filter-field ff-range">
            <label>지시일</label>
            <div class="date-range">
                <input type="date" id="f-from" class="form-control form-control-sm">
                <span class="tilde">~</span>
                <input type="date" id="f-to" class="form-control form-control-sm">
            </div>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <div class="table-wrap">
    <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
            <th>번호</th><th>완제품</th><th class="text-end">수량</th><th>지시일</th><th>완료예정</th><th>상태</th><th style="width:80px;"></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="7" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    <nav class="mt-3"><ul class="pagination pagination-sm" id="pager"></ul></nav>

<script>
    const STATUS = {
        PLANNED:   {label: '계획', color: 'secondary'},
        RELEASED:  {label: '착수', color: 'primary'},
        COMPLETED: {label: '완료', color: 'success'},
        CANCELLED: {label: '취소', color: 'dark'},
    };
    let page = 0;
    const SIZE = 10;

    async function loadProducts() {
        try {
            const data = await ERP.api('/api/items' + ERP.query({status: 'ACTIVE', size: 500}));
            const sel = document.getElementById('f-product');
            (data.content || []).filter(i => i.itemType === 'FINISHED').forEach(i => {
                const o = document.createElement('option');
                o.value = i.id; o.textContent = `${i.name} (${i.code})`;
                sel.appendChild(o);
            });
        } catch (e) {}
    }

    function filters() {
        return {
            productItemId: document.getElementById('f-product').value,
            status: document.getElementById('f-status').value,
            dateFrom: document.getElementById('f-from').value,
            dateTo: document.getElementById('f-to').value,
        };
    }

    async function load() {
        const tbody = document.getElementById('rows');
        try {
            const data = await ERP.api('/api/production-orders' + ERP.query({...filters(), page, size: SIZE, sort: 'id,desc'}));
            const list = data.content || [];
            tbody.innerHTML = list.length === 0
                ? '<tr><td colspan="7" class="text-center text-muted py-4">생산지시가 없습니다.</td></tr>'
                : list.map(o => {
                    const s = STATUS[o.status] || {label: o.status, color: 'secondary'};
                    return `<tr style="cursor:pointer" onclick="location.href='/pp/production-orders/${o.id}'">
                        <td>${ERP.esc(o.number)}</td>
                        <td>${ERP.esc(o.productName)} <span class="text-muted small">${ERP.esc(o.productCode)}</span></td>
                        <td class="text-end">${ERP.num(o.quantity)}</td>
                        <td>${o.orderDate ?? ''}</td>
                        <td>${o.dueDate ?? '<span class="text-muted">-</span>'}</td>
                        <td>${ERP.badge(s.label, s.color)}</td>
                        <td><a class="btn btn-sm btn-outline-secondary" href="/pp/production-orders/${o.id}"
                               onclick="event.stopPropagation()">상세</a></td></tr>`;
                }).join('');
            renderPager(data.totalPages || 0, data.number || 0);
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    function renderPager(totalPages, current) {
        const pager = document.getElementById('pager');
        if (totalPages <= 1) { pager.innerHTML = ''; return; }
        let html = '';
        for (let i = 0; i < totalPages; i++)
            html += `<li class="page-item ${i === current ? 'active' : ''}">
                <a class="page-link" href="#" onclick="goto(${i});return false;">${i + 1}</a></li>`;
        pager.innerHTML = html;
    }
    function goto(p) { page = p; load(); }

    document.addEventListener('DOMContentLoaded', () => {
        loadProducts(); load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('searchForm').reset(); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
