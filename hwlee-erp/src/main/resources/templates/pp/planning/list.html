<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('계획오더 (MRP)', 'planned', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>계획오더 <span class="text-muted">(MRP)</span></h1>
            <div class="crumb">생산 (PP) · Planned Order — 수주 확정 시 부족분만큼 자동 제안</div>
        </div>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-narrow">
            <label>상태</label>
            <select id="f-status" class="form-select form-select-sm">
                <option value="PROPOSED">검토 대기</option>
                <option value="CONVERTED">전환됨</option>
                <option value="DISMISSED">기각됨</option>
                <option value="">전체</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 검색</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화"><i class="bi bi-arrow-counterclockwise"></i></button>
        </div>
    </form>

    <!-- 목록 툴바: 조회 건수 + 페이지 크기 + 엑셀 -->
    <div class="list-toolbar">
        <div class="result-count">조회 <b id="totalCount">0</b>건</div>
        <div class="toolbar-right">
            <label class="page-size">표시
                <select id="pageSize" class="form-select form-select-sm">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </label>
            <button type="button" id="btn-excel" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-file-earmark-excel"></i> Excel 다운로드
            </button>
        </div>
    </div>

    <div class="table-wrap">
    <div class="table-scroll">
    <table class="table rtable table-hover align-middle mb-0">
        <thead>
        <tr>
            <th class="text-end" style="width:52px;">No.</th>
            <th class="sortable" data-sort="number">번호<span class="sort-ind"></span></th>
            <th>완제품</th>
            <th class="text-end">필요량</th><th class="text-end">현재고</th><th class="text-end">부족분</th>
            <th>출처 수주</th>
            <th class="sortable" data-sort="status">상태<span class="sort-ind"></span></th>
            <th style="width:160px;"></th>
        </tr>
        </thead>
        <tbody id="rows"><tr><td colspan="9" class="text-center text-muted py-4">불러오는 중…</td></tr></tbody>
    </table>
    </div>
    </div>

    <nav class="pager-bar">
        <div class="page-info" id="pageInfo"></div>
        <ul class="pagination pagination-sm mb-0" id="pager"></ul>
    </nav>

    <!-- 승인(전환) 모달 -->
    <div class="modal fade" id="convertModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">생산지시로 전환</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p class="mb-3">계획오더 <strong id="cv-number"></strong> 를 승인해 생산지시를 만듭니다.</p>
            <div class="mb-3">
                <label class="form-label">완제품</label>
                <input type="text" class="form-control" id="cv-product" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">생산 수량 <span class="text-muted">(부족분)</span></label>
                <input type="text" class="form-control" id="cv-qty" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">생산 창고 <span class="text-danger">*</span></label>
                <select class="form-select" id="cv-warehouse"><option value="">선택…</option></select>
                <div class="form-text">어느 창고에 생산해 넣을지 — 계획 단계엔 미정, 지금 지정합니다.</div>
            </div>
            <div class="mb-2">
                <label class="form-label">완료 예정일 <span class="text-muted">(선택)</span></label>
                <input type="date" class="form-control" id="cv-due">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
            <button type="button" class="btn btn-primary" id="cv-submit"><i class="bi bi-gear-wide-connected"></i> 생산지시 생성</button>
          </div>
        </div>
      </div>
    </div>

<script>
    const STATUS = {
        PROPOSED:  {label: '검토 대기', color: 'warning'},
        CONVERTED: {label: '전환됨', color: 'success'},
        DISMISSED: {label: '기각됨', color: 'dark'},
    };
    let page = 0;
    let SIZE = 20;
    let convertModal = null;
    let cvId = null;
    // 정렬 상태 — 백엔드 Pageable 의 sort 파라미터로 전달된다.
    let sortKey = 'id', sortDir = 'desc';
    const sortParam = () => `${sortKey},${sortDir}`;

    async function loadWarehouses() {
        try {
            const data = await ERP.api('/api/warehouses' + ERP.query({size: 500}));
            const sel = document.getElementById('cv-warehouse');
            (data.content || []).forEach(w => {
                const o = document.createElement('option');
                o.value = w.id; o.textContent = `${w.name} (${w.code})`;
                sel.appendChild(o);
            });
        } catch (e) {}
    }

    function filters() {
        return {status: document.getElementById('f-status').value};
    }

    function rowHtml(o, i) {
        const s = STATUS[o.status] || {label: o.status, color: 'secondary'};
        const seq = page * SIZE + i + 1;
        let action = '<span class="text-muted">-</span>';
        if (o.status === 'PROPOSED') {
            action = `<button class="btn btn-sm btn-primary" onclick='openConvert(${JSON.stringify(o)})'>승인</button>
                      <button class="btn btn-sm btn-outline-secondary" onclick="dismiss(${o.id})">기각</button>`;
        } else if (o.status === 'CONVERTED') {
            action = `<span class="small text-success">→ ${ERP.esc(o.convertedProductionNumber ?? '')}</span>`;
        }
        return `<tr>
            <td class="text-end text-muted" data-label="">${seq}</td>
            <td data-label="번호">${ERP.esc(o.number)}</td>
            <td data-label="완제품">${ERP.esc(o.productName)} <span class="text-muted small">${ERP.esc(o.productCode)}</span></td>
            <td class="text-end" data-label="필요량">${ERP.num(o.requiredQty)}</td>
            <td class="text-end" data-label="현재고">${ERP.num(o.onHandQty)}</td>
            <td class="text-end fw-semibold text-danger" data-label="부족분">${ERP.num(o.shortageQty)}</td>
            <td class="small" data-label="출처 수주">${ERP.esc(o.sourceSalesOrderNumber ?? '-')}</td>
            <td data-label="상태">${ERP.badge(s.label, s.color)}</td>
            <td data-label="">${action}</td></tr>`;
    }

    async function load() {
        const tbody = document.getElementById('rows');
        tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">
            <span class="spinner-border spinner-border-sm me-1"></span> 불러오는 중…</td></tr>`;
        try {
            const q = ERP.query({...filters(), page, size: SIZE, sort: sortParam()});
            const data = await ERP.api('/api/planned-orders' + q);
            const list = data.content || [];
            document.getElementById('totalCount').textContent = (data.totalElements ?? list.length).toLocaleString('ko-KR');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">
                    <i class="bi bi-inbox"></i>조건에 맞는 계획오더가 없습니다.</div></td></tr>`;
            } else {
                tbody.innerHTML = list.map(rowHtml).join('');
            }
            ERP.pager({page, size: SIZE, totalPages: data.totalPages || 0, totalElements: data.totalElements || 0,
                       onGo: p => { page = p; load(); }});
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center text-danger py-4">불러오기 실패</td></tr>';
            ERP.flashError(e);
        }
    }

    function openConvert(o) {
        cvId = o.id;
        document.getElementById('cv-number').textContent = o.number;
        document.getElementById('cv-product').value = `${o.productName} (${o.productCode})`;
        document.getElementById('cv-qty').value = ERP.num(o.shortageQty);
        document.getElementById('cv-warehouse').value = '';
        document.getElementById('cv-due').value = '';
        convertModal.show();
    }

    async function submitConvert() {
        const warehouseId = document.getElementById('cv-warehouse').value;
        if (!warehouseId) { ERP.flash('생산 창고를 선택하세요.', 'warning'); return; }
        const dueDate = document.getElementById('cv-due').value || null;
        try {
            const po = await ERP.api(`/api/planned-orders/${cvId}/convert`, {
                method: 'POST', body: {warehouseId: Number(warehouseId), dueDate}
            });
            convertModal.hide();
            ERP.flash(`생산지시 ${po.number} 생성됨 — 생산지시 화면에서 착수/완료할 수 있습니다.`, 'success');
            load();
        } catch (e) { ERP.flashError(e); }
    }

    async function dismiss(id) {
        if (!confirm('이 계획오더를 기각하시겠습니까? (생산하지 않음)')) return;
        try {
            await ERP.api(`/api/planned-orders/${id}/dismiss`, {method: 'POST'});
            ERP.flash('기각되었습니다.', 'success');
            load();
        } catch (e) { ERP.flashError(e); }
    }

    /** 정렬 헤더 표시(▲▼) 갱신. */
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const ind = th.querySelector('.sort-ind');
            th.classList.remove('asc', 'desc');
            if (th.dataset.sort === sortKey) {
                th.classList.add(sortDir);
                ind.textContent = sortDir === 'asc' ? '▲' : '▼';
            } else {
                ind.textContent = '↕';
            }
        });
    }

    /** 헤더 클릭 → 같은 컬럼이면 방향 토글, 다른 컬럼이면 그 컬럼 기준 정렬. */
    function onSortClick(th) {
        const key = th.dataset.sort;
        if (sortKey === key) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = key;
            sortDir = 'asc';
        }
        page = 0;
        updateSortIndicators();
        load();
    }

    /** 현재 검색 조건 전체를 한 번에 받아 CSV(엑셀)로 내려받기. */
    async function exportExcel() {
        const btn = document.getElementById('btn-excel');
        btn.disabled = true;
        try {
            const q = ERP.query({...filters(), page: 0, size: 10000, sort: sortParam()});
            const data = await ERP.api('/api/planned-orders' + q);
            const list = data.content || [];
            if (list.length === 0) { ERP.flash('내보낼 계획오더가 없습니다.', 'warning'); return; }
            const csv = ERP.toCsv(list, [
                {label: '번호', value: o => o.number},
                {label: '완제품코드', value: o => o.productCode},
                {label: '완제품명', value: o => o.productName},
                {label: '필요량', value: o => o.requiredQty ?? 0},
                {label: '현재고', value: o => o.onHandQty ?? 0},
                {label: '부족분', value: o => o.shortageQty ?? 0},
                {label: '출처 수주', value: o => o.sourceSalesOrderNumber ?? ''},
                {label: '상태', value: o => (STATUS[o.status]?.label ?? o.status)},
            ]);
            ERP.download(`계획오더목록_${ERP.today()}.csv`, csv);
        } catch (e) {
            ERP.flashError(e);
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        convertModal = new bootstrap.Modal(document.getElementById('convertModal'));
        updateSortIndicators();
        loadWarehouses(); load();
        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); page = 0; load(); });
        document.getElementById('btn-reset').addEventListener('click', () => {
            document.getElementById('f-status').value = 'PROPOSED'; page = 0; load();
        });
        document.getElementById('cv-submit').addEventListener('click', submitConvert);
        document.getElementById('btn-excel').addEventListener('click', exportExcel);
        document.querySelectorAll('th.sortable').forEach(th =>
            th.addEventListener('click', () => onSortClick(th)));
        document.getElementById('pageSize').addEventListener('change', e => {
            SIZE = Number(e.target.value); page = 0; load();
        });
    });
</script>
</div>
</body>
</html>
