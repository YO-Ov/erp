<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('매출 리포트', 'sales-report', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>매출 리포트</h1>
            <div class="crumb">리포트 · Sales Report</div>
        </div>
    </div>

    <form id="searchForm" class="filter-bar">
        <div class="filter-field ff-range">
            <label>매출일 범위</label>
            <div class="date-range">
                <input type="date" id="f-from" class="form-control form-control-sm">
                <span class="tilde">~</span>
                <input type="date" id="f-to" class="form-control form-control-sm">
            </div>
        </div>
        <div class="filter-field ff-narrow">
            <label>집계 단위</label>
            <select id="f-unit" class="form-select form-select-sm">
                <option value="DAY">일별</option>
                <option value="MONTH">월별</option>
            </select>
        </div>
        <div class="filter-actions">
            <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-search"></i> 조회</button>
            <button type="button" id="btn-reset" class="btn btn-sm btn-outline-secondary btn-icon" title="초기화">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
    </form>

    <div class="table-wrap">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>기간</th>
                <th class="text-end">건수</th>
                <th class="text-end">공급가</th>
                <th class="text-end">부가세</th>
                <th class="text-end">합계</th>
            </tr>
            </thead>
            <tbody id="rows">
            <tr><td colspan="5" class="text-center text-muted py-4">불러오는 중…</td></tr>
            </tbody>
            <tfoot id="foot"></tfoot>
        </table>
    </div>

    <script>
        function ym(d) { return d.toISOString().slice(0, 10); }

        function setDefaults() {
            const now = new Date();
            const first = new Date(now.getFullYear(), now.getMonth(), 1);
            document.getElementById('f-from').value = ym(first);
            document.getElementById('f-to').value = ym(now);
            document.getElementById('f-unit').value = 'DAY';
        }

        async function load() {
            const tbody = document.getElementById('rows');
            const foot = document.getElementById('foot');
            const params = {
                from: document.getElementById('f-from').value,
                to: document.getElementById('f-to').value,
                unit: document.getElementById('f-unit').value,
            };
            try {
                const data = await ERP.api('/api/reports/sales' + ERP.query(params));
                const rows = data.rows || [];
                tbody.innerHTML = rows.length === 0
                    ? '<tr><td colspan="5" class="text-center text-muted py-4">해당 기간 매출 없음</td></tr>'
                    : rows.map(r => `<tr>
                        <td>${ERP.esc(r.period)}</td>
                        <td class="text-end">${ERP.num(r.invoiceCount)}</td>
                        <td class="text-end">${ERP.won(r.subtotal)}</td>
                        <td class="text-end">${ERP.won(r.taxAmount)}</td>
                        <td class="text-end fw-semibold">${ERP.won(r.totalAmount)}</td></tr>`).join('');
                const t = data.total;
                foot.innerHTML = `<tr class="table-light fw-bold">
                    <td>합계</td>
                    <td class="text-end">${ERP.num(t.invoiceCount)}</td>
                    <td class="text-end">${ERP.won(t.subtotal)}</td>
                    <td class="text-end">${ERP.won(t.taxAmount)}</td>
                    <td class="text-end">${ERP.won(t.totalAmount)}</td></tr>`;
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">불러오기 실패</td></tr>';
                foot.innerHTML = '';
                ERP.flashError(e);
            }
        }

        document.getElementById('searchForm').addEventListener('submit', e => { e.preventDefault(); load(); });
        document.getElementById('btn-reset').addEventListener('click', () => { setDefaults(); load(); });

        setDefaults();
        load();
    </script>
</div>
</body>
</html>
