<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('수주 작성', 'order', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1 id="title">신규 수주</h1>
            <div class="crumb">영업 (SD) · Sales Order</div>
        </div>
        <a href="/sd/sales-orders" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> 목록</a>
    </div>

    <form id="form">
        <div class="card form-card mb-3"><div class="card-body">
            <div class="row g-3">
                <div class="col-md-3" id="quotation-box">
                    <label class="form-label">견적에서 불러오기 <span class="text-muted small">(선택)</span></label>
                    <select id="quotation" class="form-select">
                        <option value="">직접 입력</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">고객 <span class="text-danger">*</span></label>
                    <select id="customer" class="form-select" required><option value="">선택…</option></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">영업담당 <span class="text-muted small">(선택)</span></label>
                    <select id="salesperson" class="form-select"><option value="">선택…</option></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">주문일 <span class="text-danger">*</span></label>
                    <input type="date" id="orderDate" class="form-control" required>
                </div>
            </div>
            <div id="credit-info" class="alert alert-light border mt-3 mb-0 py-2 px-3 small" style="display:none;"></div>
        </div></div>

        <div class="card mb-3">
            <div class="card-header">품목 라인 <span class="text-danger">*</span></div>
            <div class="card-body">
                <table class="table line-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>품목</th>
                        <th style="width:140px;" class="text-end">주문량</th>
                        <th style="width:160px;" class="text-end">단가</th>
                        <th style="width:160px;" class="text-end">라인 합계</th>
                        <th style="width:50px;"></th>
                    </tr>
                    </thead>
                    <tbody id="lines"></tbody>
                    <tfoot>
                    <tr><td colspan="3" class="text-end fw-bold">합계</td>
                        <td class="text-end fw-bold" id="grandTotal">₩0</td><td></td></tr>
                    </tfoot>
                </table>
                <button type="button" class="btn btn-sm btn-outline-secondary mt-3" onclick="addLine()">＋ 라인 추가</button>
            </div>
        </div>

        <div class="form-actions">
            <a href="/sd/sales-orders" class="btn btn-outline-secondary">취소</a>
            <button type="submit" class="btn btn-primary">저장</button>
        </div>
    </form>

<script th:inline="javascript">
    const ID = [[${id}]];
    const isEdit = ID != null;
    let items = [];
    let pickedQuotationId = null; // 견적에서 불러온 경우 그 견적 id 를 수주에 링크
    let creditCache = null;       // 선택된 고객의 신용한도 현황 캐시(라인 변경 시 재계산만)

    async function loadItems() {
        // 판매 대상만 — 완제품(FINISHED)만 조회해 부품(COMPONENT)이 라인 품목에 섞이지 않게 한다.
        const data = await ERP.api('/api/items' + ERP.query({status: 'ACTIVE', itemType: 'FINISHED', size: 500}));
        items = data.content || [];
    }
    async function loadCustomers() {
        const data = await ERP.api('/api/customers' + ERP.query({status: 'ACTIVE', size: 500}));
        fill('customer', (data.content || []).map(c => [c.id, `${c.name} (${c.code})`]));
    }
    async function loadSalespersons() {
        const data = await ERP.api('/api/employees');
        const list = Array.isArray(data) ? data : (data.content || []);
        fill('salesperson', list.map(e => [e.id, `${e.name} (${e.code})`]));
    }
    async function loadAcceptedQuotations() {
        const data = await ERP.api('/api/quotations' + ERP.query({status: 'ACCEPTED', size: 200}));
        fill('quotation', (data.content || []).map(q => [q.id, `${q.number} · ${q.customerName}`]));
    }
    function fill(id, pairs) {
        const sel = document.getElementById(id);
        pairs.forEach(([v, t]) => { const o = document.createElement('option'); o.value = v; o.textContent = t; sel.appendChild(o); });
    }

    function itemOptions(selectedId) {
        return ['<option value="">선택…</option>']
            .concat(items.map(i =>
                `<option value="${i.id}" data-price="${i.standardPrice ?? 0}"
                    ${selectedId === i.id ? 'selected' : ''}>${ERP.esc(i.name)} (${ERP.esc(i.code)})</option>`)).join('');
    }

    function addLine(line) {
        const tbody = document.getElementById('lines');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><select class="form-select form-select-sm line-item" onchange="onItemChange(this)">${itemOptions(line?.itemId)}</select>
                <div class="atp-line small mt-1"></div></td>
            <td><input type="number" step="any" min="0" class="form-control form-control-sm text-end line-qty"
                       value="${line?.orderQty ?? ''}" oninput="recalc()"></td>
            <td><input type="number" step="any" min="0" class="form-control form-control-sm text-end line-price"
                       value="${line?.unitPrice ?? ''}" oninput="recalc()"></td>
            <td class="text-end line-total">₩0</td>
            <td><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove();recalc()">✕</button></td>`;
        tbody.appendChild(tr);
        if (line?.itemId) loadLineAtp(tr);   // 견적/수정으로 품목이 미리 채워진 라인은 즉시 ATP 조회
        recalc();
    }
    function onItemChange(sel) {
        const tr = sel.closest('tr');
        const opt = sel.selectedOptions[0];
        const priceInput = tr.querySelector('.line-price');
        if (opt && opt.dataset.price && !priceInput.value) priceInput.value = opt.dataset.price;
        loadLineAtp(tr);     // 품목이 바뀌면 출고가능 수량(ATP) 다시 조회
        recalc();
    }

    // 라인 품목의 출고가능 수량(ATP)을 조회해 라인에 캐시(data-atp)하고 표시한다. (품목이 바뀔 때만 호출)
    async function loadLineAtp(tr) {
        const box = tr.querySelector('.atp-line');
        const itemId = tr.querySelector('.line-item').value;
        if (!itemId) { tr.removeAttribute('data-atp'); box.innerHTML = ''; return; }
        try {
            const a = await ERP.api('/api/atp?itemId=' + itemId);
            tr.dataset.atp = a.atp;
            tr.dataset.onHand = a.onHand;
            tr.dataset.committed = a.committed;
            tr.dataset.inbound = a.inboundProduction;
            renderLineAtp(tr);
        } catch (e) { tr.removeAttribute('data-atp'); box.innerHTML = '<span class="text-muted">출고가능 수량 조회 불가</span>'; }
    }

    // 캐시된 ATP 와 현재 입력한 주문량을 비교해 라인 안내를 그린다. (주문량 입력마다 호출)
    // 분해(현재고/출하대기/입고예정)를 수량 옆에 항상 인라인으로 표시한다.
    function renderLineAtp(tr) {
        const box = tr.querySelector('.atp-line');
        if (!box) return;
        if (tr.dataset.atp == null) { box.innerHTML = ''; return; }
        const atp = Number(tr.dataset.atp);
        const qty = parseFloat(tr.querySelector('.line-qty').value) || 0;
        const over = qty > atp;
        const breakdown = `현재고 ${ERP.num(tr.dataset.onHand)} − 출하대기 ${ERP.num(tr.dataset.committed)}`
            + ` + 입고예정 ${ERP.num(tr.dataset.inbound)}`;
        box.innerHTML = `<span class="${over ? 'text-danger fw-semibold' : 'text-muted'}">`
            + `<i class="bi bi-box-seam"></i> 출고가능 수량 ${ERP.num(atp)}`
            + ` <span class="text-muted">(${breakdown})</span></span>`;
    }

    function recalc() {
        let grand = 0;
        document.querySelectorAll('#lines tr').forEach(tr => {
            const qty = parseFloat(tr.querySelector('.line-qty').value) || 0;
            const price = parseFloat(tr.querySelector('.line-price').value) || 0;
            tr.querySelector('.line-total').textContent = ERP.won(qty * price);
            renderLineAtp(tr);   // 주문량 변화에 맞춰 ATP 초과 경고 갱신
            grand += qty * price;
        });
        document.getElementById('grandTotal').textContent = ERP.won(grand);
        renderFormCredit(grand);
    }

    // 고객 선택 시 신용한도 현황을 조회해 캐시. (API 호출은 고객이 바뀔 때만)
    async function loadFormCredit() {
        const cid = document.getElementById('customer').value;
        const box = document.getElementById('credit-info');
        if (!cid) { creditCache = null; box.style.display = 'none'; return; }
        try {
            creditCache = await ERP.api('/api/sales-orders/credit-status?customerId=' + cid);
            box.style.display = '';
            renderFormCredit();
        } catch (e) { creditCache = null; box.style.display = 'none'; }
    }

    // 캐시된 한도 + 현재 입력한 주문 합계로 "이 주문 포함 시 남은 한도" 를 그린다.
    function renderFormCredit(grand) {
        if (!creditCache) return;
        if (grand == null) {
            grand = 0;
            document.querySelectorAll('#lines tr').forEach(tr => {
                grand += (parseFloat(tr.querySelector('.line-qty').value) || 0)
                    * (parseFloat(tr.querySelector('.line-price').value) || 0);
            });
        }
        const after = Number(creditCache.remaining) - grand;
        document.getElementById('credit-info').innerHTML =
            `여신한도 ${ERP.won(creditCache.creditLimit)} · 여신잔액 ${ERP.won(creditCache.used)}`
            + ` <span class="text-muted small">(미청구수주 ${ERP.won(creditCache.orderBacklog)} + 미수금 ${ERP.won(creditCache.receivable)})</span>`
            + ` · 가용한도 <strong>${ERP.won(creditCache.remaining)}</strong>`
            + ` → 이 주문(${ERP.won(grand)}) 포함 시 가용한도 `
            + `<strong class="${after < 0 ? 'text-danger' : 'text-success'}">${ERP.won(after)}</strong>`
            + (after < 0
                ? ' <span class="badge bg-danger">한도 초과 — 확정 불가</span>'
                  + ` <a href="/fi/credit-limit-requests?customerId=${creditCache.customerId}"`
                  + ` class="btn btn-sm btn-outline-danger py-0 px-2 ms-1"><i class="bi bi-shield-plus"></i> 여신 상향 요청</a>`
                : '');
    }
    function collectLines() {
        const lines = [];
        document.querySelectorAll('#lines tr').forEach(tr => {
            const itemId = tr.querySelector('.line-item').value;
            if (itemId) lines.push({
                itemId: Number(itemId),
                orderQty: tr.querySelector('.line-qty').value,
                unitPrice: tr.querySelector('.line-price').value,
            });
        });
        return lines;
    }

    // 견적 선택 → 고객/라인 자동 채우기
    async function onQuotationChange() {
        const qid = document.getElementById('quotation').value;
        document.getElementById('lines').innerHTML = '';
        if (!qid) { pickedQuotationId = null; addLine(); return; }
        try {
            const q = await ERP.api('/api/quotations/' + qid);
            pickedQuotationId = q.id;
            const csel = document.getElementById('customer');
            csel.value = q.customerId;
            await loadFormCredit();   // 견적으로 고객이 정해지면 신용한도도 갱신
            (q.lines || []).forEach(l => addLine({itemId: l.itemId, orderQty: l.quantity, unitPrice: l.unitPrice}));
            recalc();
        } catch (e) { ERP.flashError(e); }
    }

    async function submit(e) {
        e.preventDefault();
        const lines = collectLines();
        if (lines.length === 0) { ERP.flash('품목 라인을 최소 1개 입력하세요.', 'warning'); return; }
        const sp = document.getElementById('salesperson').value;
        const body = {
            salespersonId: sp ? Number(sp) : null,
            orderDate: document.getElementById('orderDate').value,
            lines,
        };
        try {
            let saved;
            if (isEdit) {
                saved = await ERP.api('/api/sales-orders/' + ID, {method: 'PUT', body});
            } else {
                body.customerId = Number(document.getElementById('customer').value);
                body.quotationId = pickedQuotationId;
                saved = await ERP.api('/api/sales-orders', {method: 'POST', body});
            }
            location.href = '/sd/sales-orders/' + saved.id;
        } catch (err) { ERP.flashError(err); }
    }

    async function init() {
        try {
            await Promise.all([loadItems(), loadCustomers(), loadSalespersons()]);
            if (isEdit) {
                document.getElementById('title').textContent = '수주 수정';
                document.getElementById('quotation-box').style.display = 'none'; // 수정 시 견적 불러오기 숨김
                const o = await ERP.api('/api/sales-orders/' + ID);
                const csel = document.getElementById('customer');
                csel.value = o.customerId; csel.disabled = true; // 고객 변경 불가
                if (o.salespersonId) document.getElementById('salesperson').value = o.salespersonId;
                document.getElementById('orderDate').value = o.orderDate ?? '';
                (o.lines || []).forEach(addLine);
                await loadFormCredit();   // 수정 모드: 고객이 정해져 있으니 바로 한도 표시
            } else {
                await loadAcceptedQuotations();
                document.getElementById('quotation').addEventListener('change', onQuotationChange);
                document.getElementById('customer').addEventListener('change', loadFormCredit);
                addLine();
            }
            recalc();
        } catch (err) { ERP.flashError(err); }
        document.getElementById('form').addEventListener('submit', submit);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</div>
</body>
</html>
