<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('견적 상세', 'quotation', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1>견적 상세 <span id="h-number" class="text-muted fs-6 fw-normal"></span></h1>
            <div class="crumb">영업 (SD) · Quotation</div>
        </div>
        <a href="/sd/quotations" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> 목록</a>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <!-- 전표 상단: 합계 금액 강조 + 상태 -->
            <div class="detail-hero">
                <div class="hero-main">
                    <span class="hero-label">합계 금액</span>
                    <div class="hero-amount" id="d-total">-</div>
                </div>
                <div class="hero-side">
                    <span class="hero-label">상태</span>
                    <div id="d-status">-</div>
                </div>
            </div>
            <!-- 헤더 필드 그리드 -->
            <div class="detail-grid">
                <div class="dg-item"><span class="dg-label">고객</span><span class="dg-value" id="d-customer">-</span></div>
                <div class="dg-item"><span class="dg-label">발행일</span><span class="dg-value" id="d-issued">-</span></div>
                <div class="dg-item"><span class="dg-label">유효기간</span><span class="dg-value" id="d-valid">-</span></div>
                <div class="dg-item"><span class="dg-label">등록</span><span class="dg-value muted" id="d-audit">-</span></div>
            </div>
        </div>
    </div>

    <!-- 상태별 액션 버튼 -->
    <div class="mb-3" id="actions"></div>

    <h6>품목 라인</h6>
    <table class="table rtable table-bordered align-middle bg-white">
        <thead class="table-light">
        <tr>
            <th style="width:60px;">#</th>
            <th>품목</th>
            <th class="text-end">수량</th>
            <th class="text-end">단가</th>
            <th class="text-end">라인 합계</th>
        </tr>
        </thead>
        <tbody id="lines"></tbody>
    </table>

<script th:inline="javascript">
    const ID = [[${id}]];
    const STATUS = {
        DRAFT:     {label: '초안',   color: 'secondary'},
        APPROVED:  {label: '승인됨(발송대기)', color: 'info'},
        SENT:      {label: '발송됨', color: 'primary'},
        ACCEPTED:  {label: '수락됨', color: 'success'},
        CONVERTED: {label: '수주전환', color: 'info'},
        EXPIRED:   {label: '만료',   color: 'warning'},
        CANCELLED: {label: '취소됨', color: 'dark'},
    };

    let approvalState = null; // 이 견적에 걸린 최신 결재(없으면 null)

    async function load() {
        try {
            const q = await ERP.api('/api/quotations/' + ID);
            try {
                approvalState = await ERP.api(`/api/approvals/for?docType=QUOTATION&refId=${ID}`);
            } catch (e) { approvalState = null; } // 204 = 결재 없음
            render(q);
        } catch (e) {
            ERP.flashError(e);
        }
    }

    function render(q) {
        const s = STATUS[q.status] || {label: q.status, color: 'secondary'};
        document.getElementById('h-number').textContent = q.number;
        document.getElementById('d-status').innerHTML = ERP.badge(s.label, s.color);
        document.getElementById('d-customer').textContent = `${q.customerName} (${q.customerCode})`;
        document.getElementById('d-issued').textContent = q.issuedDate ?? '-';
        document.getElementById('d-valid').textContent = q.validUntil ?? '-';
        document.getElementById('d-total').textContent = ERP.won(q.totalAmount);
        document.getElementById('d-audit').textContent =
            `${q.createdBy ?? '?'} · ${(q.createdAt ?? '').replace('T', ' ').slice(0, 16)}`;

        document.getElementById('lines').innerHTML = (q.lines || []).map(l => `
            <tr>
                <td data-label="#">${l.lineNo}</td>
                <td class="rt-wide" data-label="품목">${ERP.esc(l.itemName)} <span class="text-muted small">${ERP.esc(l.itemCode)}</span></td>
                <td class="text-end" data-label="수량">${ERP.num(l.quantity)}</td>
                <td class="text-end" data-label="단가">${ERP.won(l.unitPrice)}</td>
                <td class="text-end" data-label="라인 합계">${ERP.won(l.lineTotal)}</td>
            </tr>`).join('');

        renderActions(q.status);
    }

    // 상태머신: DRAFT(수정/결재상신/취소), APPROVED(발송/취소), SENT(승인/취소), 그 외(읽기전용)
    // 발송은 전자결재를 거친다 — 최종 승인 시 APPROVED(발송대기), 담당자가 발송하면 SENT.
    function renderActions(status) {
        const box = document.getElementById('actions');
        const a = approvalState;
        if (status === 'DRAFT') {
            if (a && a.status === 'PENDING') {
                box.innerHTML = `<span class="badge badge-soft badge-soft-warning me-2">
                        <i class="bi bi-pen"></i> 결재 진행 중 · ${ERP.esc(a.number)}</span>
                    <a href="/approvals" class="btn btn-sm btn-outline-secondary">결재함에서 보기</a>`;
                return;
            }
            // 결재가 반려(REJECTED)됐으면 사유를 안내하고 수정 후 재상신을 유도.
            let banner = '';
            if (a && a.status === 'REJECTED') {
                const reason = (a.steps || []).filter(s => s.status === 'REJECTED')
                    .map(s => s.comment).find(c => c) || '';
                banner = `<div class="alert alert-danger py-2 px-3 small mb-2">
                    <i class="bi bi-x-circle"></i> 결재 반려됨 (${ERP.esc(a.number)})${reason ? ' · 사유: ' + ERP.esc(reason) : ''}
                    — 견적을 수정한 뒤 다시 상신하세요.</div>`;
            }
            const btns = [`<a href="/sd/quotations/${ID}/edit" class="btn btn-sm btn-outline-primary">수정</a>`];
            if (a && a.status === 'DRAFT') {
                btns.push(`<a href="/approvals" class="btn btn-sm btn-warning"><i class="bi bi-arrow-return-left"></i> 반송됨 · 결재함에서 재상신</a>`);
            } else {
                const label = (a && a.status === 'REJECTED') ? '수정 후 다시 상신' : '결재 상신';
                btns.push(`<button class="btn btn-sm btn-primary" onclick="submitApproval()"><i class="bi bi-pen"></i> ${label}</button>`);
            }
            btns.push(`<button class="btn btn-sm btn-outline-danger" onclick="act('cancel','취소')">취소</button>`);
            box.innerHTML = banner + btns.join(' ');
        } else if (status === 'APPROVED') {
            box.innerHTML = `<span class="badge badge-soft badge-soft-info me-2"><i class="bi bi-check2-circle"></i> 결재 승인됨 · 발송 대기</span>
                <button class="btn btn-sm btn-primary" onclick="act('send','발송')"><i class="bi bi-send"></i> 발송</button>
                <button class="btn btn-sm btn-outline-danger" onclick="act('cancel','취소')">취소</button>`;
        } else if (status === 'SENT') {
            box.innerHTML = `<button class="btn btn-sm btn-success" onclick="act('accept','승인')">승인</button>
                <button class="btn btn-sm btn-outline-danger" onclick="act('cancel','취소')">취소</button>`;
        } else {
            box.innerHTML = '<span class="text-muted small">최종 상태입니다(읽기 전용).</span>';
        }
    }

    async function submitApproval() {
        if (!confirm('이 견적을 결재 상신하시겠습니까? 전결 규정에 따라 결재선이 자동 구성됩니다.')) return;
        try {
            const a = await ERP.api(`/api/quotations/${ID}/submit-approval`, {method: 'POST'});
            ERP.flash(`결재 상신 완료 · ${a.number} (결재선 ${(a.steps || []).length}단계)`, 'success');
            load();
        } catch (e) { ERP.flashError(e); }
    }

    async function act(action, label) {
        if (!confirm(`이 견적을 ${label}하시겠습니까?`)) return;
        try {
            const q = await ERP.api(`/api/quotations/${ID}/${action}`, {method: 'POST'});
            ERP.flash(`${label} 완료`, 'success');
            render(q);
        } catch (e) {
            ERP.flashError(e);
        }
    }

    document.addEventListener('DOMContentLoaded', load);
</script>
</div>
</body>
</html>
