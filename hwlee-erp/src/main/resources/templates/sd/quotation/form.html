<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('견적 작성', 'quotation', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div id="flash"></div>

    <div class="page-head">
        <div>
            <h1 id="title">신규 견적</h1>
            <div class="crumb">영업 (SD) · Quotation</div>
        </div>
        <a href="/sd/quotations" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> 목록</a>
    </div>

    <form id="form">
        <div class="card form-card mb-3"><div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">고객 <span class="text-danger">*</span></label>
                    <select id="customer" class="form-select" required>
                        <option value="">선택…</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">발행일 <span class="text-danger">*</span></label>
                    <input type="date" id="issuedDate" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">유효기간 <span class="text-muted small">(선택)</span></label>
                    <input type="date" id="validUntil" class="form-control">
                </div>
            </div>
        </div></div>

        <div class="card mb-3">
            <div class="card-header">품목 라인 <span class="text-danger">*</span></div>
            <div class="card-body">
                <table class="table line-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>품목</th>
                        <th style="width:140px;" class="text-end">수량</th>
                        <th style="width:160px;" class="text-end">단가</th>
                        <th style="width:160px;" class="text-end">라인 합계</th>
                        <th style="width:50px;"></th>
                    </tr>
                    </thead>
                    <tbody id="lines"></tbody>
                    <tfoot>
                    <tr>
                        <td colspan="3" class="text-end fw-bold">합계</td>
                        <td class="text-end fw-bold" id="grandTotal">₩0</td>
                        <td></td>
                    </tr>
                    </tfoot>
                </table>
                <button type="button" class="btn btn-sm btn-outline-secondary mt-3" onclick="addLine()">＋ 라인 추가</button>
            </div>
        </div>

        <div class="form-actions">
            <a href="/sd/quotations" class="btn btn-outline-secondary">취소</a>
            <button type="submit" class="btn btn-primary" id="submitBtn">저장</button>
        </div>
    </form>
</div>

<script th:inline="javascript">
    const ID = [[${id}]];          // null 이면 신규, 값 있으면 수정
    const isEdit = ID != null;
    let items = [];                 // 품목 마스터 캐시

    async function loadItems() {
        const data = await ERP.api('/api/items' + ERP.query({status: 'ACTIVE', size: 500}));
        items = data.content || [];
    }

    async function loadCustomers(selectedId) {
        const data = await ERP.api('/api/customers' + ERP.query({status: 'ACTIVE', size: 500}));
        const sel = document.getElementById('customer');
        (data.content || []).forEach(c => {
            const o = document.createElement('option');
            o.value = c.id;
            o.textContent = `${c.name} (${c.code})`;
            if (selectedId && c.id === selectedId) o.selected = true;
            sel.appendChild(o);
        });
    }

    function itemOptions(selectedId) {
        return ['<option value="">선택…</option>']
            .concat(items.map(i =>
                `<option value="${i.id}" data-price="${i.standardPrice ?? 0}"
                    ${selectedId === i.id ? 'selected' : ''}>${ERP.esc(i.name)} (${ERP.esc(i.code)})</option>`))
            .join('');
    }

    function addLine(line) {
        const tbody = document.getElementById('lines');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><select class="form-select form-select-sm line-item" onchange="onItemChange(this)">
                ${itemOptions(line?.itemId)}</select></td>
            <td><input type="number" step="any" min="0" class="form-control form-control-sm text-end line-qty"
                       value="${line?.quantity ?? ''}" oninput="recalc()"></td>
            <td><input type="number" step="any" min="0" class="form-control form-control-sm text-end line-price"
                       value="${line?.unitPrice ?? ''}" oninput="recalc()"></td>
            <td class="text-end line-total">₩0</td>
            <td><button type="button" class="btn btn-sm btn-outline-danger"
                        onclick="this.closest('tr').remove();recalc()">✕</button></td>`;
        tbody.appendChild(tr);
        recalc();
    }

    // 품목 선택 시 단가가 비어 있으면 표준판가로 자동 채움(수정 가능)
    function onItemChange(sel) {
        const opt = sel.selectedOptions[0];
        const priceInput = sel.closest('tr').querySelector('.line-price');
        if (opt && opt.dataset.price && !priceInput.value) {
            priceInput.value = opt.dataset.price;
        }
        recalc();
    }

    function recalc() {
        let grand = 0;
        document.querySelectorAll('#lines tr').forEach(tr => {
            const qty = parseFloat(tr.querySelector('.line-qty').value) || 0;
            const price = parseFloat(tr.querySelector('.line-price').value) || 0;
            const total = qty * price;
            tr.querySelector('.line-total').textContent = ERP.won(total);
            grand += total;
        });
        document.getElementById('grandTotal').textContent = ERP.won(grand);
    }

    function collectLines() {
        const lines = [];
        document.querySelectorAll('#lines tr').forEach(tr => {
            const itemId = tr.querySelector('.line-item').value;
            const quantity = tr.querySelector('.line-qty').value;
            const unitPrice = tr.querySelector('.line-price').value;
            if (itemId) lines.push({itemId: Number(itemId), quantity, unitPrice});
        });
        return lines;
    }

    async function submit(e) {
        e.preventDefault();
        const lines = collectLines();
        if (lines.length === 0) { ERP.flash('품목 라인을 최소 1개 입력하세요.', 'warning'); return; }

        const body = {
            issuedDate: document.getElementById('issuedDate').value,
            validUntil: document.getElementById('validUntil').value || null,
            lines,
        };
        try {
            let saved;
            if (isEdit) {
                saved = await ERP.api('/api/quotations/' + ID, {method: 'PUT', body});
            } else {
                body.customerId = Number(document.getElementById('customer').value);
                saved = await ERP.api('/api/quotations', {method: 'POST', body});
            }
            location.href = '/sd/quotations/' + saved.id;
        } catch (err) {
            ERP.flashError(err);
        }
    }

    async function init() {
        try {
            await Promise.all([loadItems(), loadCustomers()]);
            if (isEdit) {
                document.getElementById('title').textContent = '견적 수정';
                const q = await ERP.api('/api/quotations/' + ID);
                // 수정 시 고객은 변경 불가(UpdateRequest 에 customerId 없음)
                const csel = document.getElementById('customer');
                csel.value = q.customerId;
                csel.disabled = true;
                document.getElementById('issuedDate').value = q.issuedDate ?? '';
                document.getElementById('validUntil').value = q.validUntil ?? '';
                (q.lines || []).forEach(addLine);
            } else {
                addLine(); // 신규는 빈 라인 1개로 시작
            }
            recalc();
        } catch (err) {
            ERP.flashError(err);
        }
        document.getElementById('form').addEventListener('submit', submit);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</div>
</body>
</html>
