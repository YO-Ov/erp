spring:
  # 비밀번호 등 민감값은 git 에서 제외된 secret.properties 로 주입.
  # (운영에선 이 파일 없이 환경변수 MES_DB_PASSWORD 가 우선 적용됨)
  # optional: → 파일이 없어도 기동 실패하지 않고 환경변수로 fallback.
  config:
    import: optional:file:./secret.properties
  datasource:
    # 회사 RDS(MySQL 8.4) - 학습 전용 스키마 mes_db / 전용 유저 mes_app
    # 호스트·비밀번호는 환경변수/secret.properties 로만 주입 (yml 에 평문·엔드포인트 금지)
    url: jdbc:mysql://${MES_DB_HOST}:3306/mes_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MES_DB_USER:mes_app}
    password: ${MES_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
