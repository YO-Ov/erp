<!DOCTYPE html>
<!--
  MES 공통 셸(데코레이터). 각 화면은:
    <html th:replace="~{fragments/layout :: document('작업지시', ~{::content})}">
    <body><div th:fragment="content"> ...본문... </div></body></html>
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:fragment="document(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'HYUNWOO MES · ' + ${title}">HYUNWOO MES</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/mes.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/mes.js"></script>
</head>
<body>
<header class="mes-topbar">
    <a class="mes-brand" href="/work-orders">
        <i class="bi bi-cpu"></i> HYUNWOO <span>MES</span>
    </a>
    <span class="mes-sub">현장 실행 시스템</span>
</header>
<main class="mes-content">
    <div th:replace="${content}">본문</div>
</main>
</body>
</html>
