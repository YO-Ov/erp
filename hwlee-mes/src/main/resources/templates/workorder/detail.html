<!DOCTYPE html>
<html th:replace="~{fragments/layout :: document('작업지시 상세', ~{::content})}"
      lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div id="flash"></div>

    <div class="page-head">
        <h1 id="title">작업지시</h1>
        <a class="btn btn-outline-secondary btn-sm" href="/work-orders"><i class="bi bi-list"></i> 목록</a>
    </div>

    <!-- 작업지시 정보 -->
    <div class="card mb-3"><div class="card-body">
        <dl class="row mb-0" id="info"><dd class="text-muted">불러오는 중…</dd></dl>
    </div></div>

    <!-- 상태별 액션 -->
    <div class="card mb-3"><div class="card-body action-bar" id="actions"></div></div>

    <!-- 실적 이력 -->
    <h6 class="fw-bold mb-2">실적 이력</h6>
    <div class="card"><div class="card-body p-0">
        <table class="table mb-0">
            <thead><tr><th>#</th><th class="text-end">양품</th><th class="text-end">불량</th><th>불량코드</th><th>자재 투입</th><th>시각</th></tr></thead>
            <tbody id="results"><tr><td colspan="6" class="text-center text-muted py-3">—</td></tr></tbody>
        </table>
    </div></div>

    <script th:inline="javascript">
        const ID = [[${id}]];
        let equipments = [], operators = [], defectReasons = [];

        async function load() {
            try {
                [equipments, operators, defectReasons] = await Promise.all([
                    MES.api('/api/equipments'), MES.api('/api/operators'), MES.api('/api/defect-reasons')
                ]);
                const wo = await MES.api('/api/work-orders/' + ID);
                renderInfo(wo);
                renderActions(wo);
                renderResults(await MES.api('/api/work-orders/' + ID + '/results'));
            } catch (e) {
                MES.flash(e.message);
            }
        }

        function renderInfo(w) {
            document.getElementById('title').textContent = w.workOrderNo;
            const q = Number(w.quantity) || 0, done = Number(w.producedQty) || 0;
            const pct = q > 0 ? Math.min(100, Math.round(done / q * 100)) : 0;
            document.getElementById('info').innerHTML = `
                <dt class="col-sm-3">ERP 생산지시</dt><dd class="col-sm-3">${MES.esc(w.erpOrderNo)}</dd>
                <dt class="col-sm-3">상태</dt><dd class="col-sm-3">${MES.badge(w.status, MES.statusColor(w.status))}</dd>
                <dt class="col-sm-3">제품</dt><dd class="col-sm-3">${MES.esc(w.productCode)} ${MES.esc(w.productName)}</dd>
                <dt class="col-sm-3">지시 수량</dt><dd class="col-sm-3">${MES.num(w.quantity)}</dd>
                <dt class="col-sm-3">진행(양품/불량)</dt><dd class="col-sm-3">${MES.num(done)} (${pct}%) / 불량 ${MES.num(w.defectQty)}</dd>
                <dt class="col-sm-3">배정 설비/작업자</dt><dd class="col-sm-3">${MES.esc(w.assignedEquipmentCode || '-')} / ${MES.esc(w.assignedOperatorCode || '-')}</dd>
                <dt class="col-sm-3">시작 / 종료</dt><dd class="col-sm-9">${MES.esc(w.startedAt || '-')} ~ ${MES.esc(w.finishedAt || '-')}</dd>`;
        }

        function renderActions(w) {
            const box = document.getElementById('actions');
            if (w.status === 'RECEIVED') {
                const eqOpts = equipments.map(e => `<option value="${e.id}">${MES.esc(e.code)} ${MES.esc(e.name)}</option>`).join('');
                const opOpts = operators.map(o => `<option value="${o.id}">${MES.esc(o.code)} ${MES.esc(o.name)}</option>`).join('');
                box.innerHTML = `<div class="row g-2 align-items-end">
                    <div class="col-auto"><label class="form-label small">설비</label><select id="f-eq" class="form-select form-select-sm">${eqOpts}</select></div>
                    <div class="col-auto"><label class="form-label small">작업자</label><select id="f-op" class="form-select form-select-sm">${opOpts}</select></div>
                    <div class="col-auto"><button class="btn btn-primary" onclick="doStart()"><i class="bi bi-play-fill"></i> 작업 시작</button></div>
                </div>`;
            } else if (w.status === 'IN_PROGRESS') {
                box.innerHTML = `
                    <div class="d-flex gap-2 mb-3">
                        <button class="btn btn-warning" onclick="doAction('pause')"><i class="bi bi-pause-fill"></i> 일시정지</button>
                        <button class="btn btn-success" onclick="doAction('complete')"><i class="bi bi-check-lg"></i> 완료</button>
                    </div>
                    <div class="row g-2 align-items-end">
                        <div class="col-auto"><label class="form-label small">양품</label><input id="f-good" type="number" min="0" step="1" class="form-control form-control-sm" value="1"></div>
                        <div class="col-auto"><label class="form-label small">불량</label><input id="f-defect" type="number" min="0" step="1" class="form-control form-control-sm" value="0"></div>
                        <div class="col"><label class="form-label small">불량코드</label>
                            <select id="f-defect-reason" class="form-select form-select-sm">
                                <option value="">(없음)</option>
                                ${defectReasons.map(d => `<option value="${d.id}">${MES.esc(d.code)} ${MES.esc(d.name)}</option>`).join('')}
                            </select></div>
                        <div class="col-auto"><button class="btn btn-primary" onclick="doReport()"><i class="bi bi-plus-lg"></i> 실적 등록</button></div>
                    </div>`;
            } else if (w.status === 'PAUSED') {
                box.innerHTML = `<button class="btn btn-primary" onclick="doAction('resume')"><i class="bi bi-play-fill"></i> 재개</button>`;
            } else {
                box.innerHTML = `<span class="text-muted">완료/취소된 작업지시입니다.</span>`;
            }
        }

        function renderResults(list) {
            const tb = document.getElementById('results');
            tb.innerHTML = (!list || list.length === 0)
                ? '<tr><td colspan="6" class="text-center text-muted py-3">실적 없음</td></tr>'
                : list.map(r => {
                    const cons = (r.consumptions || []).map(c => `${MES.esc(c.componentName)} ${MES.num(c.consumedQty)}`).join(', ');
                    const reason = r.defectReasonCode
                        ? `${MES.esc(r.defectReasonCode)} ${MES.esc(r.defectReasonName)}` : '';
                    return `<tr>
                        <td>${r.seq}</td>
                        <td class="text-end">${MES.num(r.goodQty)}</td>
                        <td class="text-end">${MES.num(r.defectQty)}</td>
                        <td>${reason}</td>
                        <td><small>${cons}</small></td>
                        <td><small>${MES.esc(r.reportedAt)}</small></td></tr>`;
                }).join('');
        }

        async function doStart() {
            try {
                await MES.api('/api/work-orders/' + ID + '/start', {
                    method: 'POST',
                    body: {equipmentId: Number(document.getElementById('f-eq').value),
                           operatorId: Number(document.getElementById('f-op').value)}
                });
                MES.flash('작업을 시작했습니다.', 'success');
                load();
            } catch (e) { MES.flash(e.message); }
        }

        async function doReport() {
            const defectQty = Number(document.getElementById('f-defect').value);
            const reasonVal = document.getElementById('f-defect-reason').value;
            // 불량이 있으면 사유 코드를 반드시 선택 — 불량 분석의 전제.
            if (defectQty > 0 && !reasonVal) {
                MES.flash('불량 수량이 있으면 불량코드를 선택하세요.');
                return;
            }
            try {
                await MES.api('/api/work-orders/' + ID + '/results', {
                    method: 'POST',
                    body: {goodQty: Number(document.getElementById('f-good').value),
                           defectQty: defectQty,
                           defectReasonId: reasonVal ? Number(reasonVal) : null}
                });
                MES.flash('실적을 등록했습니다.', 'success');
                load();
            } catch (e) { MES.flash(e.message); }
        }

        async function doAction(action) {
            try {
                await MES.api('/api/work-orders/' + ID + '/' + action, {method: 'POST'});
                MES.flash('처리되었습니다.', 'success');
                load();
            } catch (e) { MES.flash(e.message); }
        }

        load();
    </script>
</div>
</body>
</html>
